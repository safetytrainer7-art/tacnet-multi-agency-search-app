<!DOCTYPE html>
<html>
<body style="background:#000; color:#00ff41; padding:20px;">
    <h3>FIELD UNIT ACTIVE</h3>
    <input id="unitID" placeholder="Enter Unit Name">
    <button style="width:100%; padding:30px; background:red; color:white;" onclick="start()">START GPS</button>
    <script src="https://cdn.appwrite.io/v1/sdk.js"></script>
    <script>
        function start() {
            const db = new Appwrite.Databases(new Appwrite.Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('YOUR_PROJECT_ID'));
            navigator.geolocation.watchPosition(pos => {
                db.createDocument('YOUR_DB_ID', 'YOUR_COLLECTION_ID', 'unique()', {
                    unit_id: document.getElementById('unitID').value,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                });
            }, null, {enableHighAccuracy: true, timeout: 0, maximumAge: 0});
        }
    </script>
</body>
</html>
