<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACNET - Real-Time GPS Search</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Impact', sans-serif; background: #0a1f3e; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: linear-gradient(145deg, #1a3f7a, #042253); padding: 8px 12px; border-bottom: 3px solid #d42e12; text-align: center; flex-shrink: 0; }
        .title { font-size: 34px; letter-spacing: 4px; font-weight: 900; color: #e0aa3c; text-shadow: 2px 2px 0 #3a280d; display: inline-block; border: 2px solid #d42e12; border-radius: 12px; padding: 2px 16px; }
        .sub { font-size: 10px; color: #ffdd88; margin-top: 4px; }
        .badge { font-size: 9px; color: #adc6ff; margin-top: 4px; }
        
        .toolbar { background: #01122cd9; backdrop-filter: blur(8px); padding: 8px 10px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; border-bottom: 1px solid #d42e12; flex-shrink: 0; }
        .toolbar button, .toolbar select { background: #000000aa; border: 1px solid #efb73e; color: #f5cb5c; padding: 8px 14px; border-radius: 30px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .toolbar button:active { transform: scale(0.96); }
        .toolbar button.active { background: #cc0000; border-color: #ff8888; }
        .toolbar input { background: #000; border: 1px solid gold; color: #f5cb5c; border-radius: 20px; padding: 8px 12px; font-size: 12px; width: 180px; }
        
        .map-container { flex: 1; position: relative; background: #001133; }
        #map { height: 100%; width: 100%; }
        .status { position: absolute; bottom: 10px; right: 10px; background: black; color: #0f0; padding: 6px 12px; border-radius: 8px; font-size: 11px; z-index: 1000; font-family: monospace; font-weight: bold; }
        
        .night-vision { filter: brightness(1.1) contrast(1.2) hue-rotate(85deg) saturate(2); }
        .drawing-cursor { cursor: crosshair !important; }
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #0b2b5c; border: 3px solid #d42e12; border-radius: 24px; padding: 30px; width: 90%; max-width: 400px; text-align: center; color: #f5cb5c; }
        .login-box input, .login-box select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid gold; color: #f5cb5c; border-radius: 30px; font-size: 14px; }
        .login-box button { background: #d42e12; color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        @media (max-width: 700px) { .title { font-size: 24px; } .toolbar button, .toolbar select { padding: 6px 10px; font-size: 10px; } }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-overlay">
    <div class="login-box">
        <h2 style="color:#e0aa3c; font-size: 28px;">🔐 TACNET</h2>
        <p style="font-size:12px;">REAL-TIME GPS • SUPABASE CONNECTED</p>
        <input type="text" id="loginEmail" placeholder="EMAIL">
        <input type="password" id="loginPassword" placeholder="PASSWORD">
        <select id="loginRole">
            <option value="law">LAW ENFORCEMENT (L)</option>
            <option value="k9">K-9 (K9)</option>
            <option value="sar">SAR (S)</option>
            <option value="civilian">CIVILIAN (C)</option>
            <option value="suspect">SUSPECT (SUS)</option>
            <option value="drone">DRONE (D)</option>
            <option value="article">ARTICLE (A)</option>
            <option value="command">COMMAND</option>
        </select>
        <input type="text" id="loginFullName" placeholder="FULL NAME">
        <input type="text" id="loginBadgeId" placeholder="BADGE/ID NUMBER">
        <input type="text" id="loginDept" placeholder="DEPARTMENT">
        <button id="loginBtn">✓ CONNECT TO SUPABASE</button>
        <p id="loginError" style="color:#ff8888; font-size:11px; margin-top:10px;"></p>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none; flex-direction:column; height:100vh;">
    <div class="header">
        <span class="title">TACNET</span>
        <div class="sub">MULTI-AGENCY-TASK-FORCE-SEARCH-APP</div>
        <div class="badge">⚡ CREATOR: DEPUTY EARL WOOD (RET.) VIRGINIA | LIVE GPS</div>
    </div>
    <div class="toolbar">
        <button id="lockMapBtn">🔒 LOCK</button>
        <button id="unlockMapBtn">🔓 UNLOCK</button>
        <button id="nightVisionBtn">🌙 NIGHT VISION</button>
        <button id="streetViewBtn">🗺️ STREET</button>
        <button id="terrainViewBtn">⛰️ TERRAIN</button>
        <button id="satelliteViewBtn">🛰️ SAT</button>
        <button id="penBtn" style="background:#ff6600;">✏️ PEN</button>
        <input type="text" id="addressSearch" placeholder="ENTER ADDRESS">
        <button id="goAddress">🔍 SEARCH</button>
        <button id="clearDrawingsBtn" style="background:#8b0000;">🗑️ CLEAR</button>
        <button id="logoutBtn" style="background:#8b0000;">🚪 EXIT</button>
    </div>
    <div class="map-container">
        <div id="map"></div>
        <div class="status" id="mapStatus">✅ CONNECTED | GPS ACTIVE</div>
    </div>
</div>

<script>
    // ========== SUPABASE CONFIGURATION ==========
    const SUPABASE_URL = 'https://podhgdaipaekmrgxkbqd.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_vVJrkjlVxVenX4Yo9nAdAQ_OH-iiTGU';
    
    let supabase;
    let currentUser = null;
    let currentSessionId = null;
    let locationInterval = null;
    
    // MAP VARIABLES
    let map, streetLayer, terrainLayer, satelliteLayer;
    let currentPerimeter = null;
    let dynamicMarkers = {};
    let drawnItems;
    let freehandGroup;
    let penActive = false;
    let isDrawing = false;
    let currentPolyline = null;
    
    // ========== INITIALIZE SUPABASE ==========
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========== LOGIN FUNCTION ==========
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const role = document.getElementById('loginRole').value;
        const fullName = document.getElementById('loginFullName').value.trim();
        const badgeId = document.getElementById('loginBadgeId').value.trim();
        const dept = document.getElementById('loginDept').value.trim();
        
        if (!email || !password || !fullName || !badgeId || !dept) {
            document.getElementById('loginError').innerText = '❌ ALL FIELDS REQUIRED';
            return;
        }
        
        try {
            // Try to sign up
            let { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { full_name: fullName, role: role, badge_id: badgeId, department: dept }
                }
            });
            
            if (error && error.message.includes('already registered')) {
                // Try login instead
                const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                if (signInError) throw signInError;
                data = signInData;
            } else if (error) {
                throw error;
            }
            
            currentUser = data.user;
            
            // Create or update profile
            const { error: profileError } = await supabase.from('profiles').upsert({
                id: currentUser.id,
                full_name: fullName,
                badge_id: badgeId,
                department: dept,
                role: role
            });
            
            if (profileError) console.log('Profile error:', profileError);
            
            // Get or create active search session
            const { data: sessionData } = await supabase
                .from('search_sessions')
                .select('*')
                .eq('is_active', true)
                .limit(1);
            
            if (sessionData && sessionData.length > 0) {
                currentSessionId = sessionData[0].id;
            } else {
                const { data: newSession } = await supabase
                    .from('search_sessions')
                    .insert({ name: `Search ${new Date().toLocaleString()}`, created_by: currentUser.id, is_active: true })
                    .select()
                    .single();
                if (newSession) currentSessionId = newSession.id;
            }
            
            // Start GPS tracking
            startGPSTracking();
            
            // Hide login, show app
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            initMap();
            loadLiveLocations();
            
        } catch (err) {
            document.getElementById('loginError').innerText = '❌ ' + err.message;
        }
    };
    
    // ========== GPS TRACKING ==========
    function startGPSTracking() {
        if (!navigator.geolocation) {
            document.getElementById('mapStatus').innerHTML = '⚠️ GPS NOT AVAILABLE';
            return;
        }
        
        locationInterval = setInterval(async () => {
            navigator.geolocation.getCurrentPosition(async (position) => {
                if (!currentUser || !currentSessionId) return;
                
                await supabase.from('locations').upsert({
                    user_id: currentUser.id,
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude,
                    accuracy: position.coords.accuracy,
                    heading: position.coords.heading,
                    speed: position.coords.speed,
                    session_id: currentSessionId,
                    updated_at: new Date()
                }, { onConflict: 'user_id' });
            }, (err) => {
                console.log('GPS error:', err);
            }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 });
        }, 3000);
    }
    
    // ========== LIVE LOCATIONS ==========
    async function loadLiveLocations() {
        await fetchLocations();
        
        // Real-time subscription
        supabase
            .channel('locations-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'locations' }, () => {
                fetchLocations();
            })
            .subscribe();
        
        supabase
            .channel('profiles-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
                fetchLocations();
            })
            .subscribe();
    }
    
    async function fetchLocations() {
        const { data: locations } = await supabase
            .from('locations')
            .select('*, profiles(full_name, role, badge_id)')
            .eq('session_id', currentSessionId)
            .order('updated_at', { ascending: false });
        
        if (locations) {
            locations.forEach(loc => updateMarker(loc));
        }
    }
    
    function getIconForRole(role) {
        const colorMap = {
            law: '#0066ff',
            k9: '#44aaff',
            sar: '#cc0000',
            civilian: '#00aa44',
            suspect: '#9900cc',
            drone: '#888888',
            article: '#ff8800',
            command: '#ffcc00'
        };
        
        const letterMap = {
            law: 'L',
            k9: 'K9',
            sar: 'S',
            civilian: 'C',
            suspect: 'SUS',
            drone: 'D',
            article: 'A',
            command: 'C'
        };
        
        const color = colorMap[role] || '#0066ff';
        const letter = letterMap[role] || '?';
        
        return L.divIcon({
            html: `<div style="background:${color}; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white; box-shadow:0 2px 6px black; font-weight:bold; font-size:${role === 'k9' ? '12px' : '16px'}; color:white;">${letter}</div>`,
            iconSize: [38, 38],
            popupAnchor: [0, -19]
        });
    }
    
    function updateMarker(location) {
        const role = location.profiles?.role || 'civilian';
        const name = location.profiles?.full_name || 'Unknown';
        const badgeId = location.profiles?.badge_id || '';
        
        const icon = getIconForRole(role);
        const markerId = location.user_id;
        
        if (dynamicMarkers[markerId]) {
            dynamicMarkers[markerId].setLatLng([location.latitude, location.longitude]);
            dynamicMarkers[markerId].setIcon(icon);
        } else {
            const marker = L.marker([location.latitude, location.longitude], { icon: icon, draggable: false })
                .bindPopup(`
                    <div style="font-size:14px; font-weight:bold;">
                        <div>${name}</div>
                        <div style="color:#888;">${badgeId} | ${role.toUpperCase()}</div>
                        <div style="color:#0f0; font-size:11px;">📍 LIVE GPS</div>
                    </div>
                `);
            if (map) marker.addTo(map);
            dynamicMarkers[markerId] = marker;
        }
    }
    
    // ========== MAP INITIALIZATION ==========
    function initMap() {
        map = L.map('map').setView([37.4316, -78.6569], 13);
        
        streetLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM', maxZoom: 19 });
        terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '© OpenTopoMap', maxZoom: 17 });
        satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 19 });
        satelliteLayer.addTo(map);
        
        // View buttons
        document.getElementById('streetViewBtn').onclick = () => {
            map.removeLayer(terrainLayer);
            map.removeLayer(satelliteLayer);
            streetLayer.addTo(map);
            document.getElementById('mapStatus').innerHTML = '🗺️ STREET VIEW';
        };
        document.getElementById('terrainViewBtn').onclick = () => {
            map.removeLayer(streetLayer);
            map.removeLayer(satelliteLayer);
            terrainLayer.addTo(map);
            document.getElementById('mapStatus').innerHTML = '⛰️ TERRAIN VIEW';
        };
        document.getElementById('satelliteViewBtn').onclick = () => {
            map.removeLayer(streetLayer);
            map.removeLayer(terrainLayer);
            satelliteLayer.addTo(map);
            document.getElementById('mapStatus').innerHTML = '🛰️ SATELLITE VIEW';
        };
        
        // Freehand drawing
        freehandGroup = L.featureGroup().addTo(map);
        
        function startDrawing(e) {
            if (!penActive) return;
            map.dragging.disable();
            isDrawing = true;
            currentPolyline = L.polyline([e.latlng], { color: '#ff3300', weight: 4, lineCap: 'round', lineJoin: 'round' }).addTo(freehandGroup);
        }
        
        function draw(e) {
            if (!isDrawing || !penActive) return;
            let points = currentPolyline.getLatLngs();
            points.push(e.latlng);
            currentPolyline.setLatLngs(points);
        }
        
        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentPolyline && currentPolyline.getLatLngs().length < 2) {
                freehandGroup.removeLayer(currentPolyline);
            }
            currentPolyline = null;
            if (!penActive && !document.getElementById('mapStatus').innerHTML.includes('LOCKED')) {
                map.dragging.enable();
            }
        }
        
        map.on('mousedown', startDrawing);
        map.on('mousemove', draw);
        map.on('mouseup', stopDrawing);
        map.on('touchstart', startDrawing);
        map.on('touchmove', draw);
        map.on('touchend', stopDrawing);
        
        // Pen button
        document.getElementById('penBtn').onclick = () => {
            penActive = !penActive;
            document.getElementById('penBtn').classList.toggle('active', penActive);
            map.getContainer().classList.toggle('drawing-cursor', penActive);
            document.getElementById('mapStatus').innerHTML = penActive ? '✏️ PEN ACTIVE - DRAW ON MAP' : '✅ READY';
            if (!penActive) {
                if (!document.getElementById('mapStatus').innerHTML.includes('LOCKED')) {
                    map.dragging.enable();
                    map.touchZoom.enable();
                    map.scrollWheelZoom.enable();
                }
            } else {
                map.dragging.disable();
                map.touchZoom.disable();
                map.scrollWheelZoom.disable();
            }
        };
        
        // Shape drawing
        drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);
        let drawControl = new L.Control.Draw({ edit: { featureGroup: drawnItems }, draw: { polygon: true, polyline: true, rectangle: true, circle: true, marker: false } });
        map.addControl(drawControl);
        map.on(L.Draw.Event.CREATED, (e) => { drawnItems.addLayer(e.layer); });
        
        // Lock/Unlock
        document.getElementById('lockMapBtn').onclick = () => {
            map.dragging.disable();
            map.touchZoom.disable();
            map.scrollWheelZoom.disable();
            document.getElementById('mapStatus').innerHTML = '🔒 MAP: LOCKED';
        };
        document.getElementById('unlockMapBtn').onclick = () => {
            if (!penActive) {
                map.dragging.enable();
                map.touchZoom.enable();
                map.scrollWheelZoom.enable();
            }
            document.getElementById('mapStatus').innerHTML = '🔓 MAP: UNLOCKED';
        };
        
        // Night Vision
        let nvActive = false;
        document.getElementById('nightVisionBtn').onclick = () => {
            nvActive = !nvActive;
            document.getElementById('map').classList.toggle('night-vision', nvActive);
        };
        
        // Clear drawings
        document.getElementById('clearDrawingsBtn').onclick = () => {
            if (confirm('Clear all drawings?')) {
                if (freehandGroup) freehandGroup.clearLayers();
                if (drawnItems) drawnItems.clearLayers();
            }
        };
        
        // Address search with perimeter
        function createGridPerimeter(lat, lng, sizeMeters = 200) {
            if (currentPerimeter) {
                if (currentPerimeter.square) map.removeLayer(currentPerimeter.square);
                if (currentPerimeter.lines) currentPerimeter.lines.forEach(l => map.removeLayer(l));
            }
            const halfDeg = (sizeMeters / 111320) / 2;
            const bounds = [[lat - halfDeg, lng - halfDeg], [lat + halfDeg, lng + halfDeg]];
            const square = L.rectangle(bounds, { color: '#00ff88', weight: 4, fillColor: '#00ff8822', fillOpacity: 0.3 });
            square.addTo(map);
            const lines = [];
            for (let i = 1; i <= 3; i++) {
                let offset = (halfDeg * i) / 2;
                lines.push(L.polyline([[lat - halfDeg, lng - halfDeg + offset], [lat + halfDeg, lng - halfDeg + offset]], { color: '#00ff88', weight: 2, opacity: 0.7 }).addTo(map));
                lines.push(L.polyline([[lat - halfDeg + offset, lng - halfDeg], [lat - halfDeg + offset, lng + halfDeg]], { color: '#00ff88', weight: 2, opacity: 0.7 }).addTo(map));
            }
            currentPerimeter = { square, lines, size: sizeMeters, center: [lat, lng] };
            
            if (!document.getElementById('periSlider')) {
                let slider = document.createElement('input');
                slider.id = 'periSlider';
                slider.type = 'range';
                slider.min = 50;
                slider.max = 800;
                slider.value = sizeMeters;
                slider.style.cssText = 'position:absolute; bottom:60px; left:10px; z-index:1000; width:150px; background:#000; border:1px solid gold; border-radius:20px;';
                document.querySelector('.map-container').appendChild(slider);
                let label = document.createElement('span');
                label.innerText = '📐 PERIMETER (m)';
                label.style.cssText = 'position:absolute; bottom:85px; left:10px; color:#0f0; font-size:10px; z-index:1000; font-weight:bold;';
                document.querySelector('.map-container').appendChild(label);
                slider.addEventListener('input', (e) => {
                    if (currentPerimeter) {
                        let newSize = parseInt(e.target.value);
                        let half = (newSize / 111320) / 2;
                        currentPerimeter.square.setBounds([[currentPerimeter.center[0] - half, currentPerimeter.center[1] - half], [currentPerimeter.center[0] + half, currentPerimeter.center[1] + half]]);
                        currentPerimeter.lines.forEach(l => map.removeLayer(l));
                        let newLines = [];
                        for (let i = 1; i <= 3; i++) {
                            let off = (half * i) / 2;
                            newLines.push(L.polyline([[currentPerimeter.center[0] - half, currentPerimeter.center[1] - half + off], [currentPerimeter.center[0] + half, currentPerimeter.center[1] - half + off]], { color: '#00ff88', weight: 2, opacity: 0.7 }).addTo(map));
                            newLines.push(L.polyline([[currentPerimeter.center[0] - half + off, currentPerimeter.center[1] - half], [currentPerimeter.center[0] - half + off, currentPerimeter.center[1] + half]], { color: '#00ff88', weight: 2, opacity: 0.7 }).addTo(map));
                        }
                        currentPerimeter.lines = newLines;
                        document.getElementById('mapStatus').innerHTML = `📐 PERIMETER: ${newSize}m`;
                    }
                });
            }
        }
        
        document.getElementById('goAddress').onclick = async () => {
            let addr = document.getElementById('addressSearch').value;
            if (!addr) return;
            let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
            let data = await res.json();
            if (data.length) {
                let lat = parseFloat(data[0].lat);
                let lon = parseFloat(data[0].lon);
                map.setView([lat, lon], 17);
                let redDot = L.circleMarker([lat, lon], { radius: 16, color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.8 }).addTo(map);
                redDot.bindPopup('📍 SEARCHED ADDRESS').openPopup();
                setTimeout(() => map.removeLayer(redDot), 5000);
                createGridPerimeter(lat, lon, 200);
            } else alert('Address not found');
        };
        
        // Logout
        document.getElementById('logoutBtn').onclick = async () => {
            if (locationInterval) clearInterval(locationInterval);
            await supabase.auth.signOut();
            location.reload();
        };
    }
</script>
</body>
</html>
