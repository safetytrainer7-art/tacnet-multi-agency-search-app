<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET MISSION CONTROL</title>
    <!-- Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; display: flex; }
        
        /* Left Mission Panel */
        .left-panel { width: 320px; background: #111; border-right: 2px solid #00ff41; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Tactical Map Area */
        .map-area { flex: 1; position: relative; border: 2px solid #00ff41; margin: 10px; }
        #map { height: 100%; width: 100%; }
        
        .tool-btn { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tool-btn:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>

<div class="left-panel">
    <h2>FIELD OPERATIONS</h2>
    <button class="tool-btn" onclick="alert('Drawing Mode')">✏️ PEN</button>
    <button class="tool-btn" onclick="alert('Eraser Mode')">🧽 ERASER</button>
    <button class="tool-btn" style="color:red; border-color:red;" onclick="alert('EMERGENCY')">🚨 OFFICER DOWN</button>
    <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
        <strong>UNIT STATUS</strong>
        <div>K9-01: ACTIVE</div>
        <div>PATROL-3: ACTIVE</div>
    </div>
</div>

<div class="map-area">
    <div id="map"></div>
</div>

<script>
    // Initialize the map
    var map = L.map('map').setView([37.5, -79.2], 12); // Centered near Lynchburg/Amherst
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'TACNET Mapping'
    }).addTo(map);
</script>

</body>
</html>
