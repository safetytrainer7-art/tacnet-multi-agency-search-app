<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Share Tech Mono', monospace; }
        
        /* PAGE 1: LOGIN (EARTH BACKDROP) */
        #auth-portal { height: 100vh; background: url('use this image.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; }
        .signin-card { background: #1a2a3a; border: 2px dashed #ff2a2a; padding: 40px; width: 350px; text-align: center; color: #e9f1ff; }
        
        /* PAGE 2: SEARCH AREA (SECOND IMAGE BACKGROUND) */
        #dashboard { height: 100vh; background: url('second_background_image.jpg') center/cover no-repeat; padding: 20px; color: white; }
        
        /* GLASS OVERLAYS */
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        .login-btn { background: #1f7a35; border: none; cursor: pointer; color: white; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- LOGIN PAGE -->
    <div id="auth-portal">
        <div class="signin-card">
            <h1>TACNET</h1>
            <p>EARL WOOD · DEPUTY SHERIFF (RET.) · VIRGINIA</p>
            <form id="login-form">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="text" id="agency" placeholder="Agency" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <label><input type="checkbox" id="isCommander"> ASSUME CHARGE OF SEARCH</label>
                <button type="submit" class="login-btn">LOGIN TO TACNET</button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD AREA -->
    <div id="dashboard" style="display:none;">
        <div class="glass-panel">
            <h2>OPERATIONAL COMMAND</h2>
            <div id="rng-tool" class="glass-panel">RNG (Automatic Spacing)</div>
            <div id="trap-trace" class="glass-panel">Trap & Trace Active</div>
        </div>
    </div>

    <script src="https://cdn.appwrite.io/v1/sdk.min.js"></script>
    <script>
        const { Client, Account, Databases, ID } = Appwrite;
        const client = new Client()
            .setEndpoint('https://nyc.cloud.appwrite.io/v1') 
            .setProject('6a38e834003e0cc64c31');
        
        const account = new Account(client);
        const databases = new Databases(client);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await account.createEmailPasswordSession(document.getElementById('email').value, document.getElementById('password').value);
                
                await databases.createDocument(
                    'tacnet_telemetry_db', 
                    'tacnet_live_units', 
                    ID.unique(), 
                    { 
                        name: document.getElementById('name').value, 
                        agency: document.getElementById('agency').value, 
                        role: document.getElementById('isCommander').checked ? 'COMMANDER' : 'SEARCHER' 
                    }
                );

                document.getElementById('auth-portal').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } catch (err) { alert("Login failed: " + err.message); }
        });
    </script>
</body>
</html>
