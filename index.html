<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET | OPERATIONAL COMMAND</title>
    <style>
        body { margin: 0; background-color: #0a1a2f; color: #e9f1ff; font-family: sans-serif; }
        .signin-card { width: 380px; background: #102641; border: 2px dashed #ff2a2a; padding: 30px; margin: 100px auto; text-align: center; }
        button { background: #1f7a35; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <!-- Auth Portal -->
    <div id="auth-portal" class="signin-card">
        <h1>TACNET</h1>
        <p>EARL WOOD · DEPUTY SHERIFF (RET.) · VIRGINIA</p>
        <button onclick="forceAccess()">FORCE ACCESS TO DASHBOARD</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none; padding: 20px;">
        <h2>TACNET OPERATIONAL COMMAND — LIVE</h2>
        <p>Database Connected: tacnet_telemetry_db</p>
    </div>

    <script>
        function forceAccess() {
            document.getElementById('auth-portal').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            console.log("Dashboard unlocked for testing.");
        }
    </script>
</body>
</html>
