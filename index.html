<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>title>TacNet Command</title</title>TESTING REFRESH</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .tactical-ui {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 6px;
            display: flex; flex-direction: column; gap: 8px; width: 200px;
        }
        button { padding: 10px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; background: #333; color: white; }
    </style>
</head>
<body>

    <div class="tactical-ui">
        <button id="cmd-btn" onclick="toggleCommand()">REQUEST COMMAND</button>
        <button id="lock-btn" onclick="toggleMapLock()">LOCK MAP</button>
        <button onclick="alert('Article Find Mode Active')">[ARTICLE FIND]</button>
        <button onclick="alert('SOS ACTIVATED')" style="background: red;">SOS EMERGENCY</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false}).setView([37.5857, -79.0361], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        let isCommander = false;
        let mapLocked = false;

        function toggleCommand() {
            isCommander = !isCommander;
            document.getElementById('cmd-btn').innerText = isCommander ? "COMMAND ACTIVE" : "REQUEST COMMAND";
            document.getElementById('cmd-btn').style.background = isCommander ? "red" : "#333";
        }

        function toggleMapLock() {
            mapLocked = !mapLocked;
            mapLocked ? map.dragging.disable() : map.dragging.enable();
            document.getElementById('lock-btn').innerText = mapLocked ? "MAP LOCKED" : "LOCK MAP";
        }

        // Click to place specific colored unit
        map.on('click', function(e) {
            if (!isCommander) return;
            const type = prompt("Unit Type (LEO, K9, SAR, SUSPECT, VICTIM, ARTICLE):");
            let color = 'blue';
            if (type.toUpperCase() === 'K9') color = 'cyan';
            else if (type.toUpperCase() === 'SAR') color = 'red';
            else if (type.toUpperCase() === 'SUSPECT') color = 'purple';
            else if (type.toUpperCase() === 'ARTICLE') color = 'orange';

            L.circleMarker(e.latlng, { radius: 12, color: color, fillOpacity: 0.9 }).addTo(map).bindPopup(type);
        });
    </script>
</body>
</html>
