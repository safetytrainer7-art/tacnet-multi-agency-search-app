
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET COMMAND - FINAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; display: flex; }
        .left-panel { width: 300px; background: #111; border-right: 2px solid #00ff41; padding: 15px; overflow-y: auto; }
        .map-area { flex: 1; position: relative; border: 2px solid #00ff41; margin: 10px; }
        #map { height: 100%; width: 100%; }
        .tool-btn { display: block; width: 100%; background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 8px; margin-bottom: 5px; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .tool-btn:hover { background: #00ff41; color: #000; }
        #dist-display { color: #fff; padding: 10px; font-size: 14px; background: #222; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="left-panel">
    <h2>TACNET OPERATIONAL</h2>
    <div id="dist-display">DISTANCE: 0m</div>
    <button class="tool-btn" onclick="setMode('measure')">📏 MEASURE (TREE TOP HEIGHT READY)</button>
    <button class="tool-btn" onclick="setMode('trace')">📡 TRAP & TRACE (UNIT TRACKING)</button>
    <hr>
    <button class="tool-btn" onclick="setMarker('blue')">🔵 LE</button>
    <button class="tool-btn" onclick="setMarker('red')">🔴 SAR</button>
    <button class="tool-btn" style="color:red;" onclick="location.reload()">CLEAR ALL</button>
</div>

<div class="map-area"><div id="map"></div></div>

<script>
    var map = L.map('map').setView([37.5, -79.2], 12);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var mode = 'measure';
    var points = [];
    var polyline = L.polyline([], {color: 'red'}).addTo(map);

    function setMode(m) { mode = m; }
    function setMarker(color) { mode = color; }

    map.on('click', function(e) {
        if (mode === 'measure') {
            points.push(e.latlng);
            polyline.setLatLngs(points);
            if(points.length > 1) {
                var dist = map.distance(points[points.length-2], points[points.length-1]);
                document.getElementById('dist-display').innerText = "DISTANCE: " + Math.round(dist) + "m";
            }
        } else if (mode === 'trace') {
            L.circleMarker(e.latlng, {radius: 4, color: 'white'}).addTo(map);
        } else {
            L.circleMarker(e.latlng, {radius: 8, color: mode}).addTo(map).on('click', function(){ map.removeLayer(this); });
        }
    });
</script>

</body>
</html>
