<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        
        #page-one { 
            height: 100vh; width: 100vw; 
            /* Optimized for mobile screens */
            background: url('ttggg.jpg') no-repeat center center; 
            background-size: contain; 
            background-color: #000; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        #page-two { 
            height: 100vh; width: 100vw; 
            background: url('second_background_image.jpg') no-repeat center center; 
            background-size: cover; 
            display: none; padding: 20px; color: white;
        }

        /* Glass Overlay Styling */
        .glass-panel { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 15px; border-radius: 8px; 
        }
    </style>
</head>
<body>

    <!-- PAGE ONE: EARTH/SATELLITE BACKGROUND -->
    <div id="page-one" onclick="transitionToDashboard()">
        <!-- Content here will be minimal per your request -->
    </div>

    <!-- PAGE TWO: SEARCH AREA -->
    <div id="page-two">
        <div class="glass-panel">
            <h2>TACTICAL SEARCH AREA</h2>
        </div>
    </div>

    <script>
        function transitionToDashboard() {
            document.getElementById('page-one').style.display = 'none';
            document.getElementById('page-two').style.display = 'block';
        }
    </script>
</body>
</html>
