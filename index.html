<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET COMMAND SYSTEM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.appwrite.io/v1/sdk.js"></script>
    <style>
        body { margin:0; background:#000; color:#00ff41; font-family:monospace; }
        #map { height: 85vh; width: 100%; border: 2px solid #00ff41; }
        .toolbar { padding: 10px; display: flex; gap: 10px; background: #111; }
        .legend { display: flex; overflow-x: auto; gap: 15px; padding: 10px; background: #000; color: #fff; font-size: 10px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <input id="addr" placeholder="Search Address...">
        <button onclick="findLocation()">GO</button>
        <button onclick="document.body.style.filter='sepia(1) hue-rotate(300deg)'">RED NVG</button>
        <button onclick="document.body.style.filter='hue-rotate(90deg)'">GREEN NVG</button>
        <button onclick="location.reload()">RESET</button>
    </div>
    <div id="map"></div>
    <div class="legend" id="legend">🔵LE 🔘K9 🔴SAR 🟢CIV 🟣SUS ⚪DRN 🟠ART ⚪VIC 🟡BOAT ⬛VEH 🟨CP 🔼FND 🔽CUS 🟧HEL</div>

    <script>
        const map = L.map('map').setView([37.5, -79.2], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        
        const client = new Appwrite.Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('YOUR_PROJECT_ID');
        const db = new Appwrite.Databases(client);
        const markers = {};

        // Real-time synchronization
        client.subscribe('databases.YOUR_DB_ID.collections.YOUR_COLLECTION_ID.documents', res => {
            const { unit_id, lat, lng } = res.payload;
            if(!markers[unit_id]) markers[unit_id] = L.circleMarker([lat, lng], {radius: 8, color: 'cyan'}).addTo(map).bindPopup(unit_id);
            else markers[unit_id].setLatLng([lat, lng]);
        });
    </script>
</body>
</html>
