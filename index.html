<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virginia Instant Code Assistant - FINAL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050805; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.app { width: 100%; max-width: 450px; background: radial-gradient(circle at top, #163016 0%, #071007 80%); border-radius: 32px; padding: 20px; border: 2px solid rgba(255, 0, 0, 0.75); box-shadow: 0 0 10px rgba(255, 0, 0, 0.8); position: relative; }
.badge { text-align: center; font-size: 58px; margin-bottom: 5px; color: #ffcf66; text-shadow: 0 0 10px gold; }
h1 { text-align: center; font-size: 22px; line-height: 1.2; color: #dcb35b; }
.sub { text-align: center; font-size: 10px; color: #d8b9a0; margin-top: 8px; margin-bottom: 15px; }
.btn { width: 100%; background: linear-gradient(to bottom, #101a10, #091109); border: 2px solid rgba(255, 50, 50, 0.75); border-radius: 18px; padding: 14px; margin-bottom: 10px; text-align: left; cursor: pointer; color: #ff9999; }
.footer { text-align: center; font-size: 13px; font-weight: bold; color: #FFD700; text-shadow: 0 0 5px #B8860B, 0 0 3px rgba(0,0,0,0.5); margin-top: 18px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="badge">⭐</div>
  <h1>VIRGINIA INSTANT<br>CODE ASSISTANT</h1>
  <div class="sub">Criminal • Traffic • Game-Fish • Juvenile/Domestic</div>
  <button class="btn"><div style="font-size:18px; font-weight:bold;">⚖️ CRIMINAL LAW</div></button>
  <button class="btn"><div style="font-size:18px; font-weight:bold;">🚔 TRAFFIC LAW</div></button>
  <div class="footer">⭐ APP CREATOR ⭐<br>EARL A. WOOD<br>DEPUTY SHERIFF (RETIRED)</div>
</div>
</body>
</html>
