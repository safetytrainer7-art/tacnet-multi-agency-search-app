<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.appwrite.io/v1/sdk.js"></script>
    <style>
        body { margin:0; background:#000; color:#00ff41; font-family:monospace; }
        #map { height: 75vh; width: 100%; border: 3px solid #00ff41; }
        .toolbar { padding: 10px; display:flex; gap:10px; background:#111; }
        .active { border: 3px solid white !important; }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="drawBtn" onclick="toggleDraw()">RED PEN</button>
        <button id="lockBtn" onclick="toggleLock()">MAP LOCK</button>
        <button onclick="toggleNVG('red')">RED NVG</button>
        <button onclick="toggleNVG('green')">GREEN NVG</button>
        <button style="color:red" onclick="terminate()">TERMINATE</button>
    </div>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([37.5, -79.2], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // Toggle Functions
        function toggleLock() {
            if(map.dragging.enabled()) { map.dragging.disable(); document.getElementById('lockBtn').classList.add('active'); }
            else { map.dragging.enable(); document.getElementById('lockBtn').classList.remove('active'); }
        }

        function toggleNVG(color) {
            const body = document.body;
            if(color === 'red') body.style.filter = (body.style.filter === 'sepia(1) hue-rotate(-50deg)') ? 'none' : 'sepia(1) hue-rotate(-50deg)';
            if(color === 'green') body.style.filter = (body.style.filter === 'hue-rotate(90deg)') ? 'none' : 'hue-rotate(90deg)';
        }
        
        // GPS Listener
        const client = new Appwrite.Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('YOUR_PROJECT_ID');
        client.subscribe('databases.YOUR_DB_ID.collections.YOUR_COLLECTION_ID.documents', res => {
            const { lat, lng, unit_id } = res.payload;
            L.circleMarker([lat, lng], {radius: 12, color: 'cyan'}).addTo(map).bindPopup(unit_id);
        });
    </script>
</body>
</html>
