<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        
        #page-one { 
            height: 100vh; width: 100vw; 
            background: url('ttggg_2.jpg') no-repeat center center; 
            background-size: cover; /* This makes the image fill the screen nicely */
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        
        #page-two { 
            display: none; height: 100vh; width: 100vw; 
            background: url('second_background_image.jpg') no-repeat center center; 
            background-size: cover;
            color: white; padding: 20px;
        }
    </style>
</head>
<body>

    <!-- PAGE ONE: CLEAN BACKGROUND -->
    <div id="page-one" onclick="document.getElementById('page-one').style.display='none'; document.getElementById('page-two').style.display='block';">
    </div>

    <!-- PAGE TWO: SEARCH AREA -->
    <div id="page-two">
        <div style="background: rgba(0,0,0,0.6); padding: 20px; border-radius: 10px;">
            <h2>TACNET OPERATIONAL COMMAND</h2>
            <p>SYSTEM READY</p>
        </div>
    </div>

</body>
</html>
