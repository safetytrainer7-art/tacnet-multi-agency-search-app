<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #000; }
        
        #page-one { 
            height: 100vh; width: 100vw; 
            background-image: url('ttggg.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            /* This will ensure the image fits entirely within the screen */
            background-size: contain; 
            cursor: pointer;
        }
        
        #page-two { 
            display: none;
            height: 100vh; width: 100vw; 
            background-image: url('second_background_image.jpg'); 
            background-size: cover;
            padding: 20px; color: white;
        }
    </style>
</head>
<body>

    <div id="page-one" onclick="document.getElementById('page-one').style.display='none'; document.getElementById('page-two').style.display='block';">
    </div>

    <div id="page-two">
        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 10px;">
            <h2>TACTICAL SEARCH AREA</h2>
        </div>
    </div>

</body>
</html>
