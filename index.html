<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACNET</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; }
        
        /* PAGE ONE: IMAGE DISPLAY */
        #page-one { 
            height: 100vh; width: 100vw; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
        }
        #page-one img { 
            width: 90%; /* This keeps it within mobile screen boundaries */
            height: auto; 
        }
        
        /* PAGE TWO: SEARCH AREA */
        #page-two { 
            display: none; height: 100vh; width: 100vw; 
            background: url('second_background_image.jpg') center/cover no-repeat; 
            padding: 20px; color: white; 
        }
    </style>
</head>
<body>

    <div id="page-one" onclick="document.getElementById('page-one').style.display='none'; document.getElementById('page-two').style.display='block';">
        <img src="ttggg.jpg" alt="TACNET Home">
    </div>

    <div id="page-two">
        <div style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 10px;">
            <h2>TACTICAL SEARCH AREA</h2>
        </div>
    </div>

</body>
</html>
