<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET - Tactical Interface</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #tacnet-app { width: 100vw; height: 100vh; background: url('ui.jpg') no-repeat center center; background-size: cover; display: flex; }
        
        .sidebar { width: 300px; background: rgba(0,0,0,0.9); padding: 20px; border-right: 1px solid #444; z-index: 10; }
        
        /* Tool Button Styling */
        .tool-btn { width: 100%; padding: 12px; margin: 8px 0; background: #222; color: #fff; border: 1px solid #666; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tool-btn:hover { background: #444; }
        .active-tool { border: 2px solid #ffcc00; background: #333; }
        
        .emergency-btn { background: #8b0000; color: white; border: 1px solid red; }
    </style>
</head>
<body>

<div id="tacnet-app">
    <div class="sidebar">
        <h3>OPERATIONAL TOOLS</h3>
        
        <button id="penBtn" class="tool-btn" onclick="setTool('pen')">✏️ PEN</button>
        <button id="eraserBtn" class="tool-btn" onclick="setTool('eraser')">🧽 ERASER</button>
        
        <div style="margin-top:20px; border-top:1px solid #444; padding-top:20px;">
            <button class="tool-btn emergency-btn" onclick="triggerEmergency()">OFFICER DOWN</button>
            <button class="tool-btn" onclick="location.reload()">RESET INTERFACE</button>
        </div>
    </div>
</div>

<script>
    let currentTool = null;

    function setTool(tool) {
        currentTool = tool;
        // Visual indicator that tool is selected
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active-tool'));
        if(tool === 'pen') document.getElementById('penBtn').classList.add('active-tool');
        if(tool === 'eraser') document.getElementById('eraserBtn').classList.add('active-tool');
        
        console.log("TOOL ACTIVATED: " + tool.toUpperCase());
    }

    function triggerEmergency() {
        alert("EMERGENCY MODE ACTIVATED");
    }
</script>

</body>
</html>
