<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET | Operational Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        .ui-panel { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #00aaff; width: 250px; }
        .k9-panel { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #ffff00; width: 220px; }
        .btn { display: block; width: 100%; margin-bottom: 5px; padding: 8px; cursor: pointer; background: #001f3f; color: #fff; border: 1px solid #00aaff; }
        .nvg-active { filter: sepia(1) hue-rotate(100deg) brightness(1.2); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel no-print">
    <h3>TACNET ASSETS</h3>
    <button class="btn" onclick="addMarker('blue', 'Law Enforcement')">Blue: LE</button>
    <button class="btn" onclick="addMarker('cyan', 'Officer & K9')">Cyan: K9 Team</button>
    <button class="btn" onclick="addMarker('red', 'SAR')">Red: SAR</button>
    <button class="btn" onclick="toggleNVG()">TOGGLE NVG</button>
    <button class="btn" style="background:#8b0000;" onclick="generateReport()">AUTO-GENERATE REPORT</button>
</div>

<div class="k9-panel no-print">
    <h3>K9 FIRST AID</h3>
    <button class="btn" onclick="speak('CPR in progress')">CPR</button>
    <button class="btn" onclick="speak('Treating gunshot wound')">Gunshot</button>
    <button class="btn" onclick="window.speechSynthesis.cancel()">STOP TALKING</button>
    <button class="btn" onclick="window.speechSynthesis.speak(new SpeechSynthesisUtterance('Repeat last instruction'))">REPEAT</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([37.4087, -79.1678], 15);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    function addMarker(color, name) {
        L.circleMarker(map.getCenter(), {color: color, radius: 8}).addTo(map).bindPopup(name).openPopup();
    }

    function toggleNVG() { document.getElementById('map').classList.toggle('nvg-active'); }

    function speak(text) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(text)); }

    function generateReport() {
        const reportWindow = window.open('', '_blank');
        reportWindow.document.write(`
            <html><body>
            <h1>TACNET OFFICIAL SEARCH REPORT</h1>
            <hr>
            <h3>FEDERAL - STATE - LOCAL TASK FORCE</h3>
            <p><strong>Date:</strong> ${new Date().toLocaleDateString()}</p>
            <p><strong>Disposition:</strong> Search finalized via TACNET System v2.1</p>
            <p><strong>Units Logged:</strong> See attached coordinate metadata.</p>
            <br><button onclick="window.print()">PRINT/SAVE AS PDF</button>
            </body></html>
        `);
    }
</script>
</body>
</html>
