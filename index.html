<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET | OPERATIONAL COMMAND</title>
    <style>
        body { margin: 0; background: url('use this image.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Share Tech Mono', monospace; color: #e9f1ff; }
        .signin-card { width: 100%; max-width: 400px; background: rgba(10, 26, 47, 0.9); border: 2px dashed #ff2a2a; padding: 30px; margin: 100px auto; text-align: center; }
        h1 { font-family: 'Stardos Stencil', serif; color: #fde08a; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid #3d6fa3; color: white; }
        button { background: #1f7a35; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <!-- SIGN-IN PORTAL -->
    <div id="auth-portal" class="signin-card">
        <h1>TACNET</h1>
        <p>EARL WOOD · DEPUTY SHERIFF (RET.) · VIRGINIA</p>
        <form id="login-form">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="text" id="agency" placeholder="Agency" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <label><input type="checkbox" id="isCommander"> ASSUME CHARGE OF SEARCH</label>
            <button type="submit">LOGIN TO TACNET</button>
        </form>
    </div>

    <!-- TACTICAL DASHBOARD -->
    <div id="dashboard" style="display:none; padding: 20px;">
        <header><h2>TACNET OPERATIONAL COMMAND</h2></header>
        <div id="tactical-tools">
            <!-- Trap & Trace, Range Notifier (RNG), and K9 Protocols -->
        </div>
    </div>

    <script src="https://cdn.appwrite.io/v1/sdk.min.js"></script>
    <script>
        const { Client, Account, Databases, ID } = Appwrite;
        const client = new Client()
            .setEndpoint('https://nyc.cloud.appwrite.io/v1') 
            .setProject('6a38e834003e0cc64c31');
        
        const account = new Account(client);
        const databases = new Databases(client);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const agency = document.getElementById('agency').value;
            const isCommander = document.getElementById('isCommander').checked;

            try {
                // Assuming session handled via email/pass
                await account.createEmailPasswordSession(document.getElementById('email').value, document.getElementById('password').value);
                
                // Logging unit to tacnet_live_units
                await databases.createDocument(
                    'tacnet-search-app', 
                    'tacnet_live_units', 
                    ID.unique(), 
                    { name, agency, role: isCommander ? 'COMMANDER' : 'SEARCHER' }
                );

                document.getElementById('auth-portal').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } catch (err) { alert("Sign-in failed. Please verify credentials."); }
        });
    </script>
</body>
</html>
