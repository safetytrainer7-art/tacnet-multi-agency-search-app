<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacNet Tactical</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        /* Cleaned UI Panel */
        .tactical-ui {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); padding: 15px; border-radius: 8px;
            display: flex; flex-direction: column; gap: 12px; width: 220px;
        }
        button { padding: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="tactical-ui">
        <button id="cmd-btn" onclick="toggleCommand()" style="background:#5ab0e5;">REQUEST COMMAND</button>
        <button id="lock-btn" onclick="toggleMapLock()">LOCK MAP</button>
        <button onclick="logArticle()">[ARTICLE FIND]</button>
        <button onclick="triggerSOS()" style="background:red; color:white;">SOS EMERGENCY</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {zoomControl: false}).setView([37.5857, -79.0361], 13);
        
        // Base Layers
        const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        const parcels = L.tileLayer('https://tiles.arcgis.com/tiles/C804GZ6tB9r1v52z/arcgis/rest/services/US_Parcel_Boundaries/MapServer/tile/{z}/{y}/{x}', {opacity: 0.5});
        
        // Simple Controls
        let isCommander = false;
        let mapLocked = false;

        function toggleCommand() {
            isCommander = !isCommander;
            document.getElementById('cmd-btn').innerText = isCommander ? "COMMAND ACTIVE" : "REQUEST COMMAND";
            document.getElementById('cmd-btn').style.background = isCommander ? "red" : "#5ab0e5";
        }

        function toggleMapLock() {
            mapLocked = !mapLocked;
            mapLocked ? map.dragging.disable() : map.dragging.enable();
            document.getElementById('lock-btn').innerText = mapLocked ? "MAP LOCKED" : "LOCK MAP";
        }

        function triggerSOS() { alert("EMERGENCY SIGNAL BROADCAST"); }
        function logArticle() { alert("Article Logged."); }

        // Unit Placement (Only when Command Active)
        map.on('click', function(e) {
            if (!isCommander) return;
            L.circleMarker(e.latlng, { radius: 12, color: 'blue' }).addTo(map).bindPopup("UNIT");
        });
    </script>
</body>
</html>
