<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACNET LIVE DEMO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family:Arial; }

#map { height:100vh; }

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#111;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:8px;
  z-index:999;
}

button{
  padding:6px;
  margin-left:5px;
  background:#0f0;
  border:none;
}

.dot{
  width:14px;
  height:14px;
  border-radius:50%;
  box-shadow:0 0 10px;
}

.me{ background:cyan; }
.unit{ background:blue; }

.safe{ box-shadow:0 0 10px lime; }
.caution{ box-shadow:0 0 15px yellow; }
.danger{ box-shadow:0 0 20px red; }
</style>
</head>

<body>

<div class="topbar">
  <div id="info">TACNET READY</div>
  <div>
    <button onclick="emergency()">🚨</button>
    <button onclick="terminate()">STOP</button>
    <button onclick="exportPDF()">📄</button>
  </div>
</div>

<div id="map"></div>

<script>

let user = {
  name: prompt("Enter Name"),
  role: prompt("Role (officer/commander)")
};

document.getElementById("info").innerText =
user.name + " | " + user.role;

let isCommander = user.role === "commander";

let map = L.map('map').setView([37.5, -79.2], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = {};
let units = {};
let events = [];

// FAKE TEAM (DEMO PURPOSE)
let fake = [
  {id:"K9-1",lat:37.501,lng:-79.21},
  {id:"PATROL-2",lat:37.504,lng:-79.19},
  {id:"SAR-3",lat:37.499,lng:-79.22}
];

function icon(cls){
  return L.divIcon({
    className:"",
    html:`<div class="dot ${cls}"></div>`
  });
}

// LOAD FAKE UNITS
fake.forEach(u=>{
  units[u.id]=u;
  markers[u.id]=L.marker([u.lat,u.lng],{icon:icon("unit")}).addTo(map);
});

// YOUR GPS
navigator.geolocation.watchPosition(p=>{
  let lat=p.coords.latitude;
  let lng=p.coords.longitude;

  if(!markers.me){
    markers.me=L.marker([lat,lng],{icon:icon("me")}).addTo(map);
  } else {
    markers.me.setLatLng([lat,lng]);
  }

  events.push({
    type:"GPS",
    id:user.name,
    lat,lng,
    time:Date.now()
  });
});

// SAFETY LAYER
function updateSafety(){

  let ids=Object.keys(units);

  ids.forEach(i=>{
    let min=9999;

    ids.forEach(j=>{
      if(i===j) return;

      let a=units[i],b=units[j];
      let d=Math.hypot(a.lat-b.lat,a.lng-b.lng)*111000;

      if(d<min)min=d;
    });

    let el=markers[i].getElement();
    if(!el) return;

    el.classList.remove("safe","caution","danger");

    if(min<10) el.classList.add("danger");
    else if(min<25) el.classList.add("caution");
    else el.classList.add("safe");
  });
}

setInterval(updateSafety,2000);

// EMERGENCY
function emergency(){
  alert("EMERGENCY TRIGGERED");
  events.push({type:"EMERGENCY",id:user.name,time:Date.now()});
}

// TERMINATE (COMMANDER ONLY)
function terminate(){
  if(!isCommander){
    alert("DENIED");
    return;
  }

  alert("SEARCH TERMINATED");
  events.push({type:"TERMINATE",time:Date.now()});
}

// PDF REPORT
function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  doc.text("TACNET REPORT",10,10);

  let y=20;

  events.forEach(e=>{
    doc.text(`${e.type} ${e.id||""}`,10,y);
    y+=6;
  });

  doc.save("TACNET_REPORT.pdf");
}

</script>

</body>
</html>
