<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET - Tactical Network</title>
    <style>
        body { margin: 0; background: #050b14; color: #fff; font-family: sans-serif; overflow: hidden; }
        .hero-container {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1b3a5f 0%, #050b14 70%);
            text-align: center;
        }
        h1 { font-size: 5rem; letter-spacing: 0.2rem; color: #add8e6; text-shadow: 0 0 20px #00aaff; }
        .info-panel { position: absolute; top: 20px; right: 20px; text-align: right; font-size: 0.9rem; }
        .login-btn {
            margin-top: 50px; padding: 15px 60px; font-size: 1.5rem;
            background: transparent; border: 2px solid #00d4ff; color: #00d4ff;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .login-btn:hover { background: #00d4ff; color: #000; }
        .map-inset { position: absolute; bottom: 50px; left: 50px; border: 1px solid #00d4ff; padding: 10px; width: 300px; }
    </style>
</head>
<body>

<div class="hero-container">
    <div class="info-panel">
        <p>CREATOR: EARL WOOD</p>
        <p>DEPUTY SHERIFF RETIRED - VIRGINIA</p>
        <p>TACNET SYSTEM: v2.1</p>
        <p>SAT STATUS: OPTIMAL</p>
        <p>UNITS ONLINE: 12</p>
        <p>REAL-TIME SYNC: ACTIVE</p>
    </div>

    <h1>TACNET</h1>
    <p style="font-size: 1.5rem; letter-spacing: 0.3rem;">TACTICAL NETWORK for search and coordination</p>

    <div class="map-inset">
        <small>ACTIVE SECTORS</small>
        <p>• Amherst SAR<br>• Lynchburg LE<br>• Appomattox K9<br>• Campbell Drone</p>
    </div>

    <button class="login-btn" onclick="alert('Proceeding to Secure Interface...')">LOGIN</button>
</div>

</body>
</html>
