    <script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([37.5857, -79.0361], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let isCommander = false;

        function toggleCommand() {
            isCommander = !isCommander;
            const btn = document.getElementById('cmd-btn');
            btn.innerText = isCommander ? "COMMAND ACTIVE" : "REQUEST COMMAND";
            btn.style.background = isCommander ? "red" : "#5ab0e5";
        }

        function createUnit(e) {
            if (!isCommander) return; // Ignore clicks if not Commander
            
            const unitName = prompt("Enter Unit Name:");
            if (!unitName) return;

            const marker = L.circleMarker(e.latlng, { radius: 10, color: 'blue' })
                .addTo(map)
                .bindPopup(unitName + "<br><button onclick='this.parentElement.parentElement.remove()'>REMOVE UNIT</button>");
        }

        map.on('click', createUnit);
    </script>
    </script>
