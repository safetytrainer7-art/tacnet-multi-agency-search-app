<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TACNET</title>
    <style>
        /* Force these images to take up the full screen */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        
        #auth-portal { 
            height: 100vh; 
            width: 100vw;
            background: url('use this image.jpg') no-repeat center center fixed; 
            background-size: cover; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* The Card Styling from your image */
        .signin-card { 
            background: #1a2a3a; 
            border: 2px dashed #ff2a2a; 
            padding: 40px; 
            width: 350px; 
            text-align: center; 
            color: #e9f1ff; 
        }
        
        /* Internal Dashboard */
        #dashboard { 
            height: 100vh; 
            width: 100vw;
            background: url('second_background_image.jpg') no-repeat center center fixed; 
            background-size: cover; 
            display: none; 
            padding: 20px; 
        }
    </style>
</head>
<body>

    <div id="auth-portal">
        <div class="signin-card">
            <h1>TACNET</h1>
            <p>EARL WOOD · DEPUTY SHERIFF (RET.) · VIRGINIA</p>
            <form id="login-form">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="text" id="agency" placeholder="Agency" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <label><input type="checkbox" id="isCommander"> ASSUME CHARGE OF SEARCH</label>
                <button type="submit" style="background:#1f7a35; color:white; border:none; padding:10px; width:100%;">LOGIN TO TACNET</button>
            </form>
        </div>
    </div>

    <div id="dashboard">
        <h2>TACTICAL SEARCH AREA</h2>
        <!-- Tactical tools will overlay here -->
    </div>

    <script src="https://cdn.appwrite.io/v1/sdk.min.js"></script>
    <script>
        const { Client, Account, Databases, ID } = Appwrite;
        const client = new Client()
            .setEndpoint('https://nyc.cloud.appwrite.io/v1') 
            .setProject('6a38e834003e0cc64c31');
        
        const account = new Account(client);
        const databases = new Databases(client);

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                // Perform Appwrite Login
                await account.createEmailPasswordSession(
                    document.getElementById('email').value, 
                    document.getElementById('password').value
                );
                
                // Switch to the search area
                document.getElementById('auth-portal').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } catch (err) {
                alert("Login failed: " + err.message);
            }
        });
    </script>
</body>
</html>
