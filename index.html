<!DOCTYPE html>
<html lang="en">
<head>
    <title>TACNET MASTER COMMAND</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.appwrite.io/v1/sdk.js"></script>
    <style>
        body { margin:0; background:#000; color:#00ff41; font-family:monospace; }
        .toolbar { padding: 10px; background:#111; display:flex; gap:5px; flex-wrap:wrap; }
        #map { height: 75vh; width: 100%; border: 3px solid #00ff41; }
        .legend-bar { display:flex; gap:8px; padding:10px; background:#000; color:#fff; overflow-x:auto; }
    </style>
</head>
<body>
    <div class="toolbar">
        <input id="addr" placeholder="Search Address...">
        <button onclick="findAddr()">GO</button>
        <button onclick="toggleDraw()">RED PEN</button>
        <button onclick="toggleLock()">MAP LOCK</button>
        <button onclick="toggleNVG('red')">RED NVG</button>
        <button onclick="toggleNVG('green')">GREEN NVG</button>
        <button style="color:red" onclick="terminate()">TERMINATE</button>
    </div>
    <div id="map"></div>
    <div class="legend-bar">
        🔵LE 🔘K9 🔴SAR 🟢CIV 🟣SUS ⚪DRN 🟠ART ⚪VIC 🟡BOAT ⬛VEH 🟨CP 🔼FND 🔽CUS 🟧HEL
    </div>

    <script>
        const map = L.map('map').setView([37.5, -79.2], 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        function findAddr() { 
            const addr = document.getElementById('addr').value;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${addr}`)
            .then(res => res.json()).then(data => {
                if(data.length > 0) map.setView([data[0].lat, data[0].lon], 16);
            });
        }

        function toggleLock() { map.dragging.enabled() ? map.dragging.disable() : map.dragging.enable(); }
        function toggleNVG(c) { document.body.style.filter = (c === 'red') ? 'sepia(1) hue-rotate(-50deg)' : 'hue-rotate(90deg)'; }
        function terminate() { location.reload(); }

        // Real-time tracking engine
        const client = new Appwrite.Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('YOUR_PROJECT_ID');
        client.subscribe('databases.YOUR_DB_ID.collections.YOUR_COLLECTION_ID.documents', res => {
            const { lat, lng, unit_id } = res.payload;
            L.circleMarker([lat, lng], {radius: 12, color: 'cyan'}).addTo(map).bindPopup(unit_id);
        });
    </script>
</body>
</html>
