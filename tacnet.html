<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; background:#000; color:#00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        .main-ui { display:flex; flex-direction:column; height:100vh; width:100vw; }
        .top-bar { padding:10px; background:#000; border-bottom:2px solid #00ff41; display:flex; gap:10px; align-items:center; }
        .middle-section { display:flex; flex:1; width:100%; height:calc(100vh - 120px); }
        #map { flex:1; border-right:2px solid #00ff41; background:#000; cursor: crosshair; }
        .sidebar { width:260px; background:#000; padding:15px; border-left:2px solid #00ff41; display:flex; flex-direction:column; gap:12px; box-sizing: border-box; overflow-y: auto; }
        .legend-bar { height:60px; background:#000; display:flex; align-items:center; overflow-x:auto; white-space:nowrap; gap:20px; padding:0 20px; border-top:2px solid #00ff41; box-sizing: border-box; }
        
        .btn-tac { background:#000; color:#00ff41; border:1px solid #00ff41; padding:10px; cursor:pointer; font-weight:bold; text-transform:uppercase; width:100%; }
        .btn-danger { color:red; border-color:red; }
        .btn-active { background:#00ff41; color:#000; }
        input { background:#000; color:#00ff41; border:1px solid #00ff41; padding:8px; width:100%; box-sizing: border-box; }
        .toggle-row { display:flex; justify-content:space-between; align-items:center; width:100%; }
        .legend-item { cursor:pointer; font-size:20px; font-weight:bold; display:inline-flex; align-items:center; gap:5px; }
        
        .modal { display:none; position:fixed; top:10%; left:10%; width:80%; height:80%; background:rgba(0,0,0,0.95); border:2px solid #00ff41; z-index:9999; padding:20px; box-sizing:border-box; overflow-y:auto; }
        .report-log { background:#111; border:1px solid #00ff41; padding:10px; font-family:monospace; height:60%; overflow-y:auto; color:#00ff41; margin-bottom:15px; }
    </style>
</head>
<body>
    <div class="main-ui">
        <!-- Top Bar -->
        <div class="top-bar">
            <input id="addrInput" placeholder="Enter Address..." style="width:300px;">
            <button class="btn-tac" style="width:auto;" onclick="searchAddr()">GO</button>
        </div>

        <!-- Main Workspace -->
        <div class="middle-section">
            <div id="map"></div>
            <div class="sidebar">
                <h3>COMMAND CONSOLE</h3>
                <button class="btn-tac" onclick="activateGPS()">ACTIVATE SEARCHERS</button>
                
                <div class="toggle-row">
                    <span>MAP LOCK</span> 
                    <input type="checkbox" id="lockToggle" onchange="toggleMapLock(this.checked)" style="width:auto;">
                </div>
                <div class="toggle-row">
                    <span>RED PEN</span> 
                    <input type="checkbox" id="penToggle" style="width:auto;" onchange="togglePenMode(this.checked)">
                </div>
                <div class="toggle-row">
                    <span>ERASER</span> 
                    <input type="checkbox" id="eraserToggle" style="width:auto;" onchange="toggleEraserMode(this.checked)">
                </div>
                
                <button class="btn-tac" id="crossfireBtn" onclick="toggleCrossfireMode()">CROSSFIRE DIST</button>
                <button class="btn-tac btn-danger" onclick="terminateSearch()">TERMINATE SEARCH</button>
            </div>
        </div>

        <!-- Scrollable Legend -->
        <div class="legend-bar">
            <span class="legend-item" onclick="setMarker('LE')">🔵 LE</span>
            <span class="legend-item" onclick="setMarker('K9')">🔘 K9</span>
            <span class="legend-item" onclick="setMarker('SAR')">🔴 SAR</span>
            <span class="legend-item" onclick="setMarker('CIV')">🟢 CIV</span>
            <span class="legend-item" onclick="setMarker('SUS')">🟣 SUS</span>
            <span class="legend-item" onclick="setMarker('DRN')">⚪ DRN</span>
            <span class="legend-item" onclick="setMarker('ART')">🟠 ART</span>
            <span class="legend-item" onclick="setMarker('VIC')">⚪ VIC</span>
            <span class="legend-item" onclick="setMarker('BOAT')">🟡 BOAT</span>
            <span class="legend-item" onclick="setMarker('VEH')">⬛ VEH</span>
            <span class="legend-item" onclick="setMarker('CP')">🟨 CP</span>
            <span class="legend-item" onclick="setMarker('FND')">🔼 FND</span>
            <span class="legend-item" onclick="setMarker('CUS')">🔽 CUS</span>
            <span class="legend-item" onclick="setMarker('HEL')">🟧 HEL</span>
            <span class="legend-item" onclick="setMarker('FED')"><span style="color:#ffd700;">🟡</span> FED</span>
            <span class="legend-item" onclick="setMarker('VSP')"><span style="color:#0000ff; text-shadow: 0 0 3px #ffd700;">🔵</span> VSP</span>
        </div>
    </div>

    <!-- Incident Report Overlay -->
    <div id="reportModal" class="modal">
        <h2>INCIDENT COMMAND REPORT & REPLAY RECORD LOG</h2>
        <div id="reportLog" class="report-log"></div>
        <button class="btn-tac" style="width:200px; margin-right:15px;" onclick="alert('Replaying history...')">REPLAY RECORDER</button>
        <button class="btn-tac btn-danger" style="width:200px;" onclick="resetConsole()">CLEAR & RESET CONSOLE</button>
    </div>

    <script>
        // Core Layers Definition
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });
        const terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: 'OTM' });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

        const map = L.map('map', {
            center: [37.4138, -79.1422], // Lynchburg base coordinate template
            zoom: 14,
            layers: [streetLayer] // Default street layout view
        });

        // Built-in Leaflet Layer control interface top right
        const baseMaps = {
            "Street View": streetLayer,
            "Terrain View": terrainLayer,
            "Satellite View": satelliteLayer
        };
        L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);

        let eventLog = [];
        let activeMarkers = [];
        let drawingLayers = [];
        let activeType = null;

        const unitColors = { 
            'LE': 'blue', 'K9': 'gray', 'SAR': 'red', 'CIV': 'green', 'SUS': 'purple', 
            'DRN': 'white', 'ART': 'orange', 'VIC': 'white', 'BOAT': 'yellow', 'VEH': 'black', 
            'CP': 'yellow', 'FND': 'blue', 'CUS': 'blue', 'HEL': 'orange', 'FED': '#ffd700', 'VSP': '#002f6c'
        };

        function logEvent(desc) {
            const time = new Date().toISOString().replace('T', ' ').substring(0, 19);
            eventLog.push({ time, desc });
        }

        function setMarker(type) { 
            activeType = type; 
            document.getElementById('penToggle').checked = false;
            document.getElementById('eraserToggle').checked = false;
            document.getElementById('crossfireBtn').classList.remove('btn-active');
            crossfireActive = false;
        }

        // Integrated Direct Canvas Placement
        map.on('click', e => {
            if (activeType) {
                let borderCol = (activeType === 'VSP') ? '#ffd700' : '#fff';
                let m = L.circleMarker(e.latlng, {radius: 11, fillColor: unitColors[activeType], color: borderCol, fillOpacity: 1, weight: 2.5}).addTo(map);
                m.unitType = activeType;
                
                // Fixed Interactive Eraser Tap Detection
                m.on('click', function(ev) {
                    L.DomEvent.stopPropagation(ev); // Stop event bubble
                    if (document.getElementById('eraserToggle').checked) {
                        logEvent(`ERASED: Removed ${this.unitType} unit marker.`);
                        map.removeLayer(this);
                        activeMarkers = activeMarkers.filter(item => item !== this);
                    } else if (crossfireActive) {
                        handleCrossfireClick(this.getLatLng());
                    }
                });

                activeMarkers.push(m);
                logEvent(`DEPLOYED: ${activeType} marker dropped at workspace location.`);
                activeType = null;
            }
        });

        // Map Lock Switch Logic
        function toggleMapLock(locked) {
            if (locked) {
                map.dragging.disable();
                map.touchZoom.disable();
                map.doubleClickZoom.disable();
                map.scrollWheelZoom.disable();
                logEvent("CONSOLE MATRIX: Map frame locked down for manual tracing overlays.");
            } else {
                map.dragging.enable();
                map.touchZoom.enable();
                map.doubleClickZoom.enable();
                map.scrollWheelZoom.enable();
                logEvent("CONSOLE MATRIX: Map frame unlocked.");
            }
        }

        // Toggles configuration
        function togglePenMode(checked) { if (checked) document.getElementById('eraserToggle').checked = false; }
        function toggleEraserMode(checked) { if (checked) document.getElementById('penToggle').checked = false; }

        // Red Pen Drag Line Engine
        let isDrawing = false;
        let activeLine = null;

        map.on('mousedown', e => {
            if (document.getElementById('penToggle').checked) {
                isDrawing = true;
                activeLine = L.polyline([e.latlng], {color: 'red', weight: 4, interactive: true}).addTo(map);
                
                // Allow red pen segments to be specifically targetable by eraser
                activeLine.on('click', function(ev) {
                    L.DomEvent.stopPropagation(ev);
                    if (document.getElementById('eraserToggle').checked) {
                        map.removeLayer(this);
                        drawingLayers = drawingLayers.filter(l => l !== this);
                    }
                });
                drawingLayers.push(activeLine);
            }
        });

        map.on('mousemove', e => { if (isDrawing && activeLine) activeLine.addLatLng(e.latlng); });
        map.on('mouseup', () => { if (isDrawing) { isDrawing = false; logEvent("DRAWING: Traced red path saved."); } });

        // Accurate Real-Time Crossfire Engine
        let crossfireActive = false;
        let firstPoint = null;
        let visualLine = null;

        function toggleCrossfireMode() {
            crossfireActive = !crossfireActive;
            const btn = document.getElementById('crossfireBtn');
            if (crossfireActive) {
                btn.classList.add('btn-active');
                firstPoint = null;
                alert("CROSSFIRE DISTANCE: Tap the map directly to drop Point A, then move cursor and tap to drop Point B.");
            } else {
                btn.classList.remove('btn-active');
                if (visualLine) map.removeLayer(visualLine);
            }
        }

        // Fallback or explicit mapping coordinate intercept for distances
        map.on('click', e => {
            if (crossfireActive && !activeType) {
                handleCrossfireClick(e.latlng);
            }
        });

        function handleCrossfireClick(latlng) {
            if (!firstPoint) {
                firstPoint = latlng;
                visualLine = L.polyline([firstPoint], {color: '#00ff41', weight: 3, dashArray: '6, 6'}).addTo(map);
                
                // Track real-time movement to calculate visual vector instantly
                map.on('mousemove', updateCrossfireLine);
            } else {
                map.off('mousemove', updateCrossfireLine);
                let finalDistance = firstPoint.distanceTo(latlng) * 3.28084; // Instant conversion to feet
                
                visualLine.addLatLng(latlng);
                visualLine.bindPopup(`RANGE CALCULATION: ${finalDistance.toFixed(0)} FT`, {closeOnClick: false}).openPopup();
                
                logEvent(`CROSSFIRE RANGING COMPLETED: Vector range determined to be ${finalDistance.toFixed(0)} feet.`);
                crossfireActive = false;
                document.getElementById('crossfireBtn').classList.remove('btn-active');
            }
        }

        function updateCrossfireLine(e) {
            if (visualLine && firstPoint) {
                visualLine.setLatLngs([firstPoint, e.latlng]);
                let dynamicDist = firstPoint.distanceTo(e.latlng) * 3.28084;
                visualLine.bindTooltip(`${dynamicDist.toFixed(0)} FT`, {sticky: true, opacity: 0.8}).openTooltip();
            }
        }

        // Addresses & Core Telemetry API
        function searchAddr() {
            const q = document.getElementById('addrInput').value;
            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q))
                .then(r => r.json())
                .then(d => { if(d.length > 0) { map.setView([d[0].lat, d[0].lon], 16); logEvent(`GEO-TARGETING: Positioned to ${q}`); } });
        }

        function activateGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                let m = L.marker([p.coords.latitude, p.coords.longitude]).addTo(map).bindPopup("COMMAND TELEMETRY FEED").openPopup();
                activeMarkers.push(m);
                map.setView([p.coords.latitude, p.coords.longitude], 16);
                logEvent("TELEMETRY ACTIVE: Base system location captured.");
            }, null, {enableHighAccuracy: true});
        }

        function terminateSearch() {
            logEvent("CRITICAL SIGNAL: Search incident matrix closed.");
            const logBox = document.getElementById('reportLog');
            logBox.innerHTML = "=== TACNET SEARCH INCIDENT COMMAND ARCHIVE ===<br><br>";
            eventLog.forEach(e => logBox.innerHTML += `[${e.time}] ${e.desc}<br>`);
            document.getElementById('reportModal').style.display = 'block';
        }

        function resetConsole() {
            activeMarkers.forEach(m => map.removeLayer(m));
            drawingLayers.forEach(l => map.removeLayer(l));
            if (visualLine) map.removeLayer(visualLine);
            activeMarkers = []; drawingLayers = []; eventLog = [];
            document.getElementById('reportModal').style.display = 'none';
        }
    </script>
</body>
</html>
