<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; height:100%; width:100%; background:#000; color:#00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        .main-ui { display:flex; flex-direction:column; height:100vh; }
        .map-container { display:flex; flex:1; }
        #map { flex:1; border-right:2px solid #00ff41; }
        .sidebar { width:260px; background:#000; padding:15px; border-left:2px solid #00ff41; display:flex; flex-direction:column; gap:10px; }
        .legend-bar { height:60px; background:#000; display:flex; align-items:center; overflow-x:auto; white-space:nowrap; gap:20px; padding:0 20px; border-top:2px solid #00ff41; font-size:18px; }
        .btn-tac { background:#000; color:#00ff41; border:1px solid #00ff41; padding:12px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <div class="main-ui">
        <div class="map-container">
            <div id="map"></div>
            <div class="sidebar">
                <h3>COMMAND CONSOLE</h3>
                <button class="btn-tac" onclick="activateGPS()">ACTIVATE SEARCHERS</button>
                <div style="display:flex; justify-content:space-between;"><span>RED PEN</span> <input type="checkbox" id="penToggle"></div>
                <button class="btn-tac" onclick="window.location.href='index.html'" style="color:red; border-color:red;">TERMINATE</button>
            </div>
        </div>
        <div class="legend-bar">
            <span onclick="alert('LE Unit Selected')" style="cursor:pointer;">🔵 LE</span>
            <span onclick="alert('K9 Unit Selected')" style="cursor:pointer;">🔘 K9</span>
            <span onclick="alert('SAR Unit Selected')" style="cursor:pointer;">🔴 SAR</span>
            <!-- Add remaining symbols here -->
        </div>
    </div>
    <script>
        const map = L.map('map').setView([37.5, -79.2], 14);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);
        
        // Fixed Red Pen
        let drawing = false;
        map.on('mousedown', () => drawing = true);
        map.on('mouseup', () => drawing = false);
        map.on('mousemove', e => { if(drawing && document.getElementById('penToggle').checked) L.circleMarker(e.latlng, {radius: 3, color: 'red'}).addTo(map); });
        
        // GPS
        function activateGPS() {
            navigator.geolocation.watchPosition(p => {
                L.marker([p.coords.latitude, p.coords.longitude]).addTo(map).bindPopup("UNIT LIVE").openPopup();
                map.setView([p.coords.latitude, p.coords.longitude], 16);
            }, () => alert("Enable GPS permissions"), {enableHighAccuracy: true});
        }
    </script>
</body>
</html>
