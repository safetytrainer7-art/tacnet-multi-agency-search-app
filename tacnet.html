<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; background:#000; color:#00ff41; font-family: monospace; overflow: hidden; }
        .main-ui { display:flex; flex-direction:column; height:100vh; width:100vw; }
        .middle-section { display:flex; flex:1; width:100%; height:calc(100vh - 60px); }
        #map { flex:1; border-right:2px solid #00ff41; }
        .sidebar { width:260px; background:#000; padding:15px; border-left:2px solid #00ff41; display:flex; flex-direction:column; gap:10px; }
        .legend-bar { height:60px; background:#000; display:flex; align-items:center; overflow-x:auto; gap:20px; padding:0 20px; border-top:2px solid #00ff41; font-size:18px; }
        .btn-tac { background:#000; color:#00ff41; border:1px solid #00ff41; padding:12px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>
    <div class="main-ui">
        <div class="middle-section">
            <div id="map"></div>
            <div class="sidebar">
                <h3>COMMAND CONSOLE</h3>
                <button class="btn-tac" onclick="activateGPS()">ACTIVATE SEARCHERS</button>
                <div style="display:flex; justify-content:space-between;"><span>RED PEN</span> <input type="checkbox" id="penToggle"></div>
                <button class="btn-tac" onclick="window.location.href='index.html'" style="color:red; border-color:red;">TERMINATE</button>
            </div>
        </div>
        <div class="legend-bar">
            <span>🔵 LE</span> <span>🔘 K9</span> <span>🔴 SAR</span> <span>🟢 CIV</span> <span>🟣 SUS</span> <span>⚪ DRN</span> 
            <span>🟠 ART</span> <span>⚪ VIC</span> <span>🟡 BOAT</span> <span>⬛ VEH</span> <span>🟨 CP</span> <span>🔼 FND</span> <span>🔽 CUS</span> <span>🟧 HEL</span>
        </div>
    </div>
    <script>
        const map = L.map('map').setView([37.5, -79.2], 14);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);
        
        let drawing = false;
        map.on('mousedown', () => drawing = true);
        map.on('mouseup', () => drawing = false);
        map.on('mousemove', e => { if(drawing && document.getElementById('penToggle').checked) L.circleMarker(e.latlng, {radius: 3, color: 'red'}).addTo(map); });
        
        function activateGPS() {
            navigator.geolocation.watchPosition(p => {
                L.marker([p.coords.latitude, p.coords.longitude]).addTo(map).bindPopup("UNIT LIVE");
                map.setView([p.coords.latitude, p.coords.longitude], 16);
            }, null, {enableHighAccuracy: true});
        }
    </script>
</body>
</html>
