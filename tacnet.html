<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; height:100%; width:100%; background:#000; color:#00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        .main-ui { display:flex; height:100vh; width:100vw; }
        #map { flex:1; border-right:2px solid #00ff41; }
        .sidebar { width:260px; background:#000; padding:15px; border-left:2px solid #00ff41; display:flex; flex-direction:column; gap:15px; }
        .btn-tac { background:#0a0a0a; color:#00ff41; border:1px solid #00ff41; padding:12px; cursor:pointer; font-weight:bold; }
        .btn-active { background:#00ff41; color:#000; }
        .toggle-row { display:flex; justify-content:space-between; align-items:center; }
    </style>
</head>
<body>
    <div class="main-ui">
        <div id="map"></div>
        <div class="sidebar">
            <h3>COMMAND CONSOLE</h3>
            <button class="btn-tac" onclick="activateGPS()">ACTIVATE SEARCHER</button>
            <div class="toggle-row"><span>RED PEN</span> <input type="checkbox" onchange="setDraw(this.checked)"></div>
            <div class="toggle-row"><span>MAP LOCK</span> <input type="checkbox" onchange="setLock(this.checked)"></div>
            <button class="btn-tac" style="color:red; border-color:red;" onclick="window.location.href='index.html'">TERMINATE</button>
        </div>
    </div>
    <script>
        const map = L.map('map').setView([37.5, -79.2], 14);
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);
        function setLock(lock) { lock ? map.dragging.disable() : map.dragging.enable(); }
        let drawMode = false;
        function setDraw(on) { drawMode = on; }
        map.on('mousemove', e => { if(drawMode) L.circleMarker(e.latlng, {radius: 2, color: '#ff0000'}).addTo(map); });
        function activateGPS() { navigator.geolocation.getCurrentPosition(p => L.marker([p.coords.latitude, p.coords.longitude]).addTo(map)); }
    </script>
</body>
</html>
