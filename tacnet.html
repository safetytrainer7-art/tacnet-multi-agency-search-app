<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TACNET" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; background:#000; color:#00ff41; font-family: -apple-system, BlinkMacSystemFont, monospace; overflow: hidden; }
        .main-ui { display: flex; flex-direction: column; height: 100vh; width: 100vw; box-sizing: border-box; position: relative; }
        
        /* Row 1: Top Navigation Bar Header Track */
        .top-bar { height: 45px; background:#001a00; border-bottom:2px solid #00ff41; display:flex; padding: 0 10px; align-items:center; justify-content: space-between; gap:12px; box-sizing: border-box; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; flex-shrink: 0; }
        .search-container { display:flex; gap:6px; align-items:center; }
        .map-toggles { display:flex; gap:4px; }
        
        /* Row 2: Maximum Map Canvas Window Workspace */
        .map-wrapper { flex: 1; width: 100%; min-height: 0; position: relative; }
        #map { height: 100%; width: 100%; background: #111; }
        
        /* ==========================================================================
           EARL'S MASTER UNDERGROUND CONSOLE SYSTEM (SLIDES UP ON COMMAND)
           ========================================================================== */
        .bottom-drawer-tray {
            position: absolute; left: 0; bottom: -175px; /* Safely shunted down below frame */
            width: 100vw; height: 175px; background: rgba(0, 0, 0, 0.96);
            display: flex; flex-direction: column; z-index: 5000;
            transition: bottom 0.25s cubic-bezier(0.1, 0.9, 0.2, 1);
            box-sizing: border-box;
            border-top: 1px solid #00ff41;
        }
        .bottom-drawer-tray.open { bottom: 15px; /* Elevated 15px from bottom screen lip */ }
        
        /* Clickable Access Tab Module */
        .tray-toggle-tab {
            position: absolute; top: -34px; left: 50%; transform: translateX(-50%);
            width: 140px; height: 34px; background: #001a00; border: 2px solid #00ff41; border-bottom: none;
            border-radius: 6px 6px 0 0; color: #00ff41; font-weight: bold; font-size: 11px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            z-index: 5001; text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        /* ROW SWAP - Top Line inside Drawer: Multi-Agency Searchers Legend Track */
        .legend-bar { height: 75px; border-bottom: 1px solid #222; padding: 0 10px; box-sizing: border-box; overflow-x: auto; white-space: nowrap; display: flex; gap: 15px; align-items: center; -webkit-overflow-scrolling: touch; }
        
        /* ROW SWAP - Bottom Line inside Drawer: Console Operational Tools Track */
        .console-row { height: 95px; padding: 0 10px; box-sizing: border-box; overflow-x: auto; white-space: nowrap; display: flex; gap: 10px; align-items: center; -webkit-overflow-scrolling: touch; }
        
        /* High-Visibility Touch Target Profiles */
        .btn-tac { background:#000; color:#00ff41; border:1px solid #00ff41; padding: 10px 16px; cursor:pointer; font-weight:bold; text-transform:uppercase; font-size: 13px; border-radius: 5px; display: inline-block; height: 40px; box-sizing: border-box; }
        .btn-map-type { background:#001a00; color:#00ff41; border:1px solid #00ff41; padding:4px 8px; cursor:pointer; font-size:11px; font-weight: bold; border-radius: 3px; }
        .btn-map-type.active { background:#00ff41; color:#000; font-weight:bold; }
        .btn-danger { color:red; border-color:red; }
        .btn-active { background: #FF8C00 !important; color: #000 !important; border-color: #FF8C00 !important; }
        
        .btn-sos { background: #ff0000 !important; color: #fff !important; border: 1px solid #fff !important; animation: pulseSOS 1s infinite; }
        @keyframes pulseSOS { 0% { background: #ff0000; } 50% { background: #880000; } 100% { background: #ff0000; } }
        
        .legend-item { cursor:pointer; font-size:20px; font-weight:bold; display:inline-flex; align-items:center; gap:6px; background: rgba(0,26,0,0.4); padding: 5px 10px; border: 1px solid #333; border-radius: 4px; color: #00ff41; }
        
        input, select { background:#000; color:#fff; border:1px solid #00ff41; padding:4px 6px; box-sizing: border-box; font-family: monospace; font-size: 12px; height: 30px; border-radius: 4px; }
        .slider-box { display:flex; align-items:center; gap:4px; font-weight:bold; font-size:11px; color: #00ff41; }
        input[type="range"] { -webkit-appearance: none; background: #002b00; border: 1px solid #00ff41; height: 6px; width: 65px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; background: #00ff41; width: 12px; height: 12px; border: 1px solid #000; border-radius: 50%; }

        .orange-dist-label { background: #000; color: #FF8C00; border: 1px solid #FF8C00; font-weight: bold; font-family: monospace; padding: 4px 8px; font-size: 12px; border-radius: 4px; }
        .leaflet-sos-pulse { animation: mapPulse 1.2s infinite ease-out; }
        @keyframes mapPulse { 0% { stroke-width: 4; stroke-opacity: 1; fill-opacity: 0.6; } 100% { stroke-width: 25; stroke-opacity: 0; fill-opacity: 0; } }
        
        .modal { display:none; position:fixed; top:2%; left:2%; width:96%; height:96%; background:#111; border:2px solid #00ff41; z-index:9999; padding:15px; box-sizing:border-box; overflow-y:auto; color:#fff; font-family: 'Times New Roman', serif; }
        .report-selector-bar { display: flex; gap: 10px; background: #000; padding: 10px; border: 1px solid #00ff41; margin-bottom: 15px; align-items: center; }
        .report-form-container { background: #fff; color: #000; padding: 15px; box-sizing: border-box; max-width: 800px; margin: 0 auto; display: none; }
        .report-form-container.active { display: block; }
    </style>
</head>
<body>
    <div class="main-ui">
        <div class="top-bar">
            <div class="search-container">
                <button class="btn-tac" style="padding: 0 12px; height: 30px; font-size: 12px; width: auto;" onclick="window.location.href='signin.html'">⬅</button>
                <input id="addrInput" placeholder="Target Address..." style="width:115px;">
                <button class="btn-tac" id="cmdGoBtn" style="width: auto; padding: 0 10px; height: 30px;" onclick="searchAddr()">GO</button>
                
                <div class="slider-box">
                    <input type="range" id="radiusSlider" min="200" max="10560" value="2500" oninput="adjustPerimeter(this.value)">
                    <span id="radiusVal" style="min-width: 45px;">2500 FT</span>
                </div>
                
                <button class="btn-tac" id="freezeMapBtn" style="height:30px; padding:0 10px; border-color:#00ff41; color:#00ff41; width:auto;" onclick="toggleMapFreeze()">MAP LOCK [OFF]</button>
            </div>

            <div class="map-toggles">
                <button class="btn-map-type active" id="btn-street" onclick="switchBaseLayer('street')">STR</button>
                <button class="btn-map-type" id="btn-terrain" onclick="switchBaseLayer('terrain')">TER</button>
                <button class="btn-map-type" id="btn-sat" onclick="switchBaseLayer('sat')">SAT</button>
            </div>
        </div>

        <div class="map-wrapper">
            <div id="map"></div>
            
            <div class="bottom-drawer-tray" id="masterTray">
                <div class="tray-toggle-tab" id="tabButton" onclick="toggleMasterTray()">▲ OPEN PANEL</div>
                
                <div class="legend-bar">
                    <span class="legend-item" onclick="setMarker('LE'); toggleMasterTray();">🔵 LE</span>
                    <span class="legend-item" onclick="setMarker('K9'); toggleMasterTray();">🔘 K9</span>
                    <span class="legend-item" onclick="setMarker('SAR'); toggleMasterTray();">🔴 SAR</span>
                    <span class="legend-item" onclick="setMarker('CIV'); toggleMasterTray();">🟢 CIV</span>
                    <span class="legend-item" onclick="setMarker('SUS'); toggleMasterTray();">🟣 SUS</span>
                    <span class="legend-item" onclick="setMarker('DRN'); toggleMasterTray();">⚪ DRN</span>
                    <span class="legend-item" onclick="setMarker('ART'); toggleMasterTray();">🟠 ART</span>
                    <span class="legend-item" onclick="setMarker('VIC'); toggleMasterTray();">⚪ VIC</span>
                    <span class="legend-item" onclick="setMarker('BOAT'); toggleMasterTray();">🟡 BOAT</span>
                    <span class="legend-item" onclick="setMarker('VEH'); toggleMasterTray();">⬛ VEH</span>
                    <span class="legend-item" onclick="setMarker('CP'); toggleMasterTray();">🟨 CP</span>
                    <span class="legend-item" onclick="setMarker('FND'); toggleMasterTray();">🔼 FND</span>
                    <span class="legend-item" onclick="setMarker('CUS'); toggleMasterTray();">🔽 CUS</span>
                    <span class="legend-item" onclick="setMarker('HEL'); toggleMasterTray();">🟧 HEL</span>
                    <span class="legend-item" onclick="setMarker('FED'); toggleMasterTray();"><span style="color:#ffd700;">🟡</span> FED</span>
                    <span class="legend-item" onclick="setMarker('VSP'); toggleMasterTray();"><span style="color:#0000ff;">🔵</span> VSP</span>
                </div>

                <div class="console-row">
                    <button class="btn-tac btn-sos" onclick="triggerSOSAlert(); toggleMasterTray();">🚨 SOS ALERT</button>
                    <button class="btn-tac" onclick="setMarker('FND'); toggleMasterTray();">🔍 ARTICLE FIND</button>
                    <button class="btn-tac" onclick="activateGPS(); toggleMasterTray();">ACTIVATE UNITS</button>
                    <button class="btn-tac" style="border-color: #ffd700; color: #ffd700;" onclick="triggerTreeTopHeight(); toggleMasterTray();">🔎 TREETOP VIEW</button>
                    <button class="btn-tac" id="crossfireBtn" onclick="toggleCrossfireMode(); toggleMasterTray();">CROSSFIRE DIST</button>
                    <button class="btn-tac" id="trapTraceBtn" onclick="toggleTrapTrace()">TRAP N TRACE</button>
                    <button class="btn-tac" style="border-color: #ff3333; color: #ff3333;" onclick="eraseLastLine(); toggleMasterTray();">❌ ERASE LINE</button>
                    <button class="btn-tac" style="border-color: #00ff41; color: #00ff41;" onclick="generateReport()">📄 VIEW REPORT</button>
                    <button class="btn-tac btn-danger" onclick="resetConsole()">TERMINATE SEARCH</button>
                </div>
            </div>
        </div>
    </div>

    <div id="reportModal" class="modal">
        <div class="report-selector-bar">
            <button class="btn-tac" style="height:auto;" onclick="document.getElementById('reportModal').style.display='none'">⬅ MAP</button>
            <button class="btn-tac" id="toggleLEFormBtn" style="border-color:#00ff41; height:auto;" onclick="setActiveForm('LE')">LE RPT</button>
            <button class="btn-tac" id="toggleFRFormBtn" style="border-color:#aaa; height:auto;" onclick="setActiveForm('FR')">FR RPT</button>
        </div>
        <div id="formContainerLE" class="report-form-container active">
            <div style="text-align:center; font-weight:bold; margin-bottom:10px;"><h2>TACNET INCIDENT MATRIX LOG</h2></div>
            <div class="report-string-box reportLogClass"></div>
        </div>
        <div id="formContainerFR" class="report-form-container">
            <div style="text-align:center; font-weight:bold; margin-bottom:10px;"><h2>TACNET FIRST RESPONDER LOG</h2></div>
            <div class="report-string-box reportLogClass"></div>
        </div>
    </div>

    <script>
        let isMapLocked = false;

        // Freeze map interaction completely to clear thumb interference when scrolling tracks
        function toggleMapLockViaButton() {
            const btn = document.getElementById('lockFreezeBtn');
            crossfireActive = false;
            document.getElementById('crossfireBtn').classList.remove('btn-active');
            
            if(!map.dragging.enabled()) {
                map.dragging.enable();
                if(map.tap) map.tap.enable();
                btn.innerText = "LOCK MAP";
                btn.style.borderColor = "#00ff41";
                btn.style.color = "#00ff41";
                btn.style.background = "#000";
            } else {
                map.dragging.disable();
                if(map.tap) map.tap.disable();
                btn.innerText = "MAP LOCKED";
                btn.style.background = "#00ff41";
                btn.style.color = "#000";
            }
        }

        function toggleMasterTray() {
            const tray = document.getElementById('masterTray');
            const tab = document.getElementById('tabButton');
            tray.classList.toggle('open');
            if (tray.classList.contains('open')) {
                tab.innerText = "▼ CLOSE PANEL";
            } else {
                tab.innerText = "▲ OPEN PANEL";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            initDuressAccelerometer();
            setTimeout(() => { map.invalidateSize(); }, 400);
        });

        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 });
        const terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 20 });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 });
        const map = L.map('map', { center: [37.4138, -79.1422], zoom: 14, maxZoom: 20, layers: [streetLayer] });

        function switchBaseLayer(type) {
            map.removeLayer(streetLayer); map.removeLayer(terrainLayer); map.removeLayer(satelliteLayer);
            document.getElementById('btn-street').classList.remove('active'); document.getElementById('btn-terrain').classList.remove('active'); document.getElementById('btn-sat').classList.remove('active');
            if (type === 'street') { streetLayer.addTo(map); document.getElementById('btn-street').classList.add('active'); }
            if (type === 'terrain') { terrainLayer.addTo(map); document.getElementById('btn-terrain').classList.add('active'); }
            if (type === 'sat') { satelliteLayer.addTo(map); document.getElementById('btn-sat').classList.add('active'); }
        }

        let eventLog = []; let activeMarkers = []; let drawingLayers = []; let crossfireVectors = [];
        let searchPerimeter = null; let perimeterCenter = null; let activeType = null; let sosVisualRing = null;

        const unitColors = { 'LE': 'blue', 'K9': 'gray', 'SAR': 'red', 'CIV': 'green', 'SUS': 'purple', 'DRN': 'white', 'ART': 'orange', 'VIC': 'white', 'BOAT': 'yellow', 'VEH': 'black', 'CP': 'yellow', 'FND': 'blue', 'CUS': 'blue', 'HEL': 'orange', 'FED': '#ffd700', 'VSP': '#002f6c' };

        function logEvent(desc) {
            const time = new Date().toISOString().replace('T', ' ').substring(0, 19);
            eventLog.push({ time, desc });
        }

        function setMarker(type) { activeType = type; crossfireActive = false; if(document.getElementById('crossfireBtn')) document.getElementById('crossfireBtn').classList.remove('btn-active'); }
        function triggerTreeTopHeight() { map.setZoom(20); }

        function triggerSOSAlert() {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude; const lon = p.coords.longitude;
                if(sosVisualRing) map.removeLayer(sosVisualRing);
                sosVisualRing = L.circle([lat, lon], { radius: 90, color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.5, className: 'leaflet-sos-pulse' }).addTo(map);
                let m = L.marker([lat, lon]).addTo(map).bindPopup(`<b style="color:red;">🚨 OFFICER SOS</b>`).openPopup();
                activeMarkers.push(m); map.setView([lat, lon], 18);
            }, null, {enableHighAccuracy: true});
        }

        function initDuressAccelerometer() {
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', event => {
                    let acceleration = event.accelerationIncludingGravity;
                    let totalForce = Math.sqrt(acceleration.x * acceleration.x + acceleration.y * acceleration.y + acceleration.z * acceleration.z);
                    if (totalForce > 35) { window.removeEventListener('devicemotion', this); executeAutomatedDuressCountdown(); }
                });
            }
        }

        function executeAutomatedDuressCountdown() {
            let countdown = 5;
            let duressTimer = setInterval(() => { countdown--; if (countdown <= 0) { clearInterval(duressTimer); triggerAutomated911Call(); } }, 1000);
            let bypass = confirm(`WARNING: Tactical impact detected. Abort dispatch?`);
            if (bypass) { clearInterval(duressTimer); initDuressAccelerometer(); }
        }

        function triggerAutomated911Call() { window.location.href = "tel:911"; triggerSOSAlert(); }

        map.on('click', e => {
            if (activeType) {
                let borderCol = (activeType === 'VSP') ? '#ffd700' : '#fff';
                let m = L.circleMarker(e.latlng, { radius: 14, fillColor: unitColors[activeType], color: borderCol, fillOpacity: 1, weight: 3, draggable: true }).addTo(map);
                m.unitType = activeType;
                if(activeType === 'SUS') m.bindTooltip("SUSPECT LKL", {permanent: true, direction: 'top', className: 'orange-dist-label'}).openTooltip();
                m.on('drag', function() { updateCrossfireDimensionality(); });
                m.on('click', function(ev) { L.DomEvent.stopPropagation(ev); map.removeLayer(this); activeMarkers = activeMarkers.filter(item => item !== this); updateCrossfireDimensionality(); });
                activeMarkers.push(m); activeType = null;
            } else if (crossfireActive) {
                handleCrossfireClick(e.latlng);
            }
        });

        function eraseLastLine() { if (drawingLayers.length > 0) { map.removeLayer(drawingLayers.pop()); } }

        let crossfireActive = false; let firstPoint = null;
        function toggleCrossfireMode() {
            crossfireActive = !crossfireActive; const btn = document.getElementById('crossfireBtn');
            if (crossfireActive) { btn.classList.add('btn-active'); firstPoint = null; activeType = null; } else { btn.classList.remove('btn-active'); }
        }

        function handleCrossfireClick(latlng) {
            let clickedMarker = activeMarkers.find(m => map.distance(latlng, m.getLatLng()) < 350);
            let targetLatLng = clickedMarker ? clickedMarker.getLatLng() : latlng;
            if (!firstPoint) { firstPoint = { latlng: targetLatLng, marker: clickedMarker || null }; } 
            else { createCrossfireVector(firstPoint, { latlng: targetLatLng, marker: clickedMarker || null }); crossfireActive = false; document.getElementById('crossfireBtn').classList.remove('btn-active'); }
        }

        function createCrossfireVector(ptA, ptB) {
            let line = L.polyline([ptA.latlng, ptB.latlng], {color: '#FF8C00', weight: 4, dashArray: '4, 4'}).addTo(map);
            let dist = ptA.latlng.distanceTo(ptB.latlng) * 3.28084;
            let labelMarker = L.marker(line.getCenter(), { icon: L.divIcon({ className: 'orange-dist-label', html: `${dist.toFixed(0)} FT` }) }).addTo(map);
            let vectorObj = { line, labelMarker, ptA, ptB };
            labelMarker.on('click', function(ev) { L.DomEvent.stopPropagation(ev); map.removeLayer(line); map.removeLayer(labelMarker); crossfireVectors = crossfireVectors.filter(v => v !== vectorObj); });
            crossfireVectors.push(vectorObj);
        }

        function updateCrossfireDimensionality() {
            crossfireVectors.forEach(v => {
                let posA = v.ptA.marker ? v.ptA.marker.getLatLng() : v.ptA.latlng; let posB = v.ptB.marker ? v.ptB.marker.getLatLng() : v.ptB.latlng;
                v.line.setLatLngs([posA, posB]); v.labelMarker.setLatLng(v.line.getCenter());
                v.labelMarker.setIcon(L.divIcon({ className: 'orange-dist-label', html: `${(posA.distanceTo(posB) * 3.28084).toFixed(0)} FT` }));
            });
        }

        let trapTraceInterval = null;
        function toggleTrapTrace() {
            const btn = document.getElementById('trapTraceBtn');
            if (!trapTraceInterval) {
                btn.innerText = "TRACE ON"; btn.classList.add('btn-active');
                trapTraceInterval = setInterval(() => {}, 2000);
            } else {
                btn.innerText = "TRAP N TRACE"; btn.classList.remove('btn-active');
                clearInterval(trapTraceInterval); trapTraceInterval = null;
            }
        }

        function searchAddr() {
            const q = document.getElementById('addrInput').value; const radiusFeet = parseFloat(document.getElementById('radiusSlider').value);
            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q))
                .then(r => r.json()).then(d => { if(d.length > 0) { perimeterCenter = [d[0].lat, d[0].lon]; map.setView(perimeterCenter, 15); drawPerimeter(radiusFeet); } });
        }

        function drawPerimeter(feet) { if (searchPerimeter) map.removeLayer(searchPerimeter); if (!perimeterCenter) return; searchPerimeter = L.circle(perimeterCenter, { radius: feet / 3.28084, color: '#00661a', fillColor: '#00ff41', fillOpacity: 0.12, weight: 4, dashArray: '8, 8' }).addTo(map); }
        function adjustPerimeter(val) { document.getElementById('radiusVal').innerText = val + " FT"; if (perimeterCenter) { drawPerimeter(parseFloat(val)); } }
        function activateGPS() { navigator.geolocation.getCurrentPosition(p => { let m = L.marker([p.coords.latitude, p.coords.longitude]).addTo(map); activeMarkers.push(m); map.setView([p.coords.latitude, p.coords.longitude], 16); }, null, {enableHighAccuracy: true}); }
        function setActiveForm(type) { document.getElementById('formContainerLE').classList.remove('active'); document.getElementById('formContainerFR').classList.remove('active'); if(type === 'LE') document.getElementById('formContainerLE').classList.add('active'); else document.getElementById('formContainerFR').classList.add('active'); }
        function generateReport() { document.getElementById('reportModal').style.display = 'block'; }
        function resetConsole() { activeMarkers.forEach(m => map.removeLayer(m)); if (searchPerimeter) map.removeLayer(searchPerimeter); activeMarkers = []; window.location.href = 'signin.html'; }
    </script>
</body>
</html>
