<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; background:#000; color:#00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        .main-ui { display:flex; flex-direction:column; height:100vh; width:100vw; }
        .top-bar { padding:10px; background:#000; border-bottom:2px solid #00ff41; display:flex; gap:10px; align-items:center; }
        .middle-section { display:flex; flex:1; width:100%; height:calc(100vh - 120px); }
        #map { flex:1; border-right:2px solid #00ff41; background:#000; cursor: crosshair; }
        .sidebar { width:260px; background:#000; padding:15px; border-left:2px solid #00ff41; display:flex; flex-direction:column; gap:12px; box-sizing: border-box; overflow-y: auto; }
        .legend-bar { height:60px; background:#000; display:flex; align-items:center; overflow-x:auto; white-space:nowrap; gap:20px; padding:0 20px; border-top:2px solid #00ff41; box-sizing: border-box; }
        
        .btn-tac { background:#000; color:#00ff41; border:1px solid #00ff41; padding:10px; cursor:pointer; font-weight:bold; text-transform:uppercase; width:100%; }
        .btn-danger { color:red; border-color:red; }
        .btn-active { background:#00ff41; color:#000; }
        input { background:#000; color:#00ff41; border:1px solid #00ff41; padding:8px; width:100%; box-sizing: border-box; }
        .toggle-row { display:flex; justify-content:space-between; align-items:center; width:100%; }
        .legend-item { cursor:pointer; font-size:20px; font-weight:bold; display:inline-flex; align-items:center; gap:5px; }
        
        /* Report Modal Overlay */
        .modal { display:none; position:fixed; top:10%; left:10%; width:80%; height:80%; background:rgba(0,0,0,0.95); border:2px solid #00ff41; z-index:9999; padding:20px; box-sizing:border-box; overflow-y:auto; }
        .report-log { background:#111; border:1px solid #00ff41; padding:10px; font-family:monospace; height:60%; overflow-y:auto; color:#00ff41; margin-bottom:15px; }
    </style>
</head>
<body>
    <div class="main-ui">
        <!-- Top Bar -->
        <div class="top-bar">
            <input id="addrInput" placeholder="Enter Address..." style="width:300px;">
            <button class="btn-tac" style="width:auto;" onclick="searchAddr()">GO</button>
        </div>

        <!-- Main Workspace -->
        <div class="middle-section">
            <div id="map"></div>
            <div class="sidebar">
                <h3>COMMAND CONSOLE</h3>
                <button class="btn-tac" onclick="activateGPS()">ACTIVATE SEARCHERS</button>
                
                <div class="toggle-row">
                    <span>RED PEN</span> 
                    <input type="checkbox" id="penToggle" style="width:auto;">
                </div>
                <div class="toggle-row">
                    <span>ERASER</span> 
                    <input type="checkbox" id="eraserToggle" style="width:auto;" onchange="toggleEraser(this.checked)">
                </div>
                
                <button class="btn-tac" id="crossfireBtn" onclick="toggleCrossfire()">CROSSFIRE DIST</button>
                <button class="btn-tac btn-danger" onclick="terminateSearch()">TERMINATE SEARCH</button>
            </div>
        </div>

        <!-- Scrollable Legend with New Federal & VSP Dots -->
        <div class="legend-bar">
            <span class="legend-item" onclick="setMarker('LE')">🔵 LE</span>
            <span class="legend-item" onclick="setMarker('K9')">🔘 K9</span>
            <span class="legend-item" onclick="setMarker('SAR')">🔴 SAR</span>
            <span class="legend-item" onclick="setMarker('CIV')">🟢 CIV</span>
            <span class="legend-item" onclick="setMarker('SUS')">🟣 SUS</span>
            <span class="legend-item" onclick="setMarker('DRN')">⚪ DRN</span>
            <span class="legend-item" onclick="setMarker('ART')">🟠 ART</span>
            <span class="legend-item" onclick="setMarker('VIC')">⚪ VIC</span>
            <span class="legend-item" onclick="setMarker('BOAT')">🟡 BOAT</span>
            <span class="legend-item" onclick="setMarker('VEH')">⬛ VEH</span>
            <span class="legend-item" onclick="setMarker('CP')">🟨 CP</span>
            <span class="legend-item" onclick="setMarker('FND')">🔼 FND</span>
            <span class="legend-item" onclick="setMarker('CUS')">🔽 CUS</span>
            <span class="legend-item" onclick="setMarker('HEL')">🟧 HEL</span>
            <span class="legend-item" onclick="setMarker('FED')"><span style="color:#ffd700;">🟡</span> FED</span>
            <span class="legend-item" onclick="setMarker('VSP')"><span style="color:#0000ff; text-shadow: 0 0 3px #ffd700;">🔵</span> VSP</span>
        </div>
    </div>

    <!-- Incident Report & Replay Overlay -->
    <div id="reportModal" class="modal">
        <h2>INCIDENT COMMAND REPORT & REPLAY RECORD LOG</h2>
        <div id="reportLog" class="report-log"></div>
        <button class="btn-tac" style="width:200px; margin-right:15px;" onclick="replayRecorder()">REPLAY RECORDER</button>
        <button class="btn-tac btn-danger" style="width:200px;" onclick="resetConsole()">CLEAR & RESET CONSOLE</button>
    </div>

    <script>
        const map = L.map('map').setView([37.4138, -79.1422], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Core tracking elements
        let eventLog = [];
        let mapMarkers = [];
        let penLines = [];
        let activeType = null;

        const unitColors = { 
            'LE': 'blue', 'K9': 'gray', 'SAR': 'red', 'CIV': 'green', 'SUS': 'purple', 
            'DRN': 'white', 'ART': 'orange', 'VIC': 'white', 'BOAT': 'yellow', 'VEH': 'black', 
            'CP': 'yellow', 'FND': 'blue', 'CUS': 'blue', 'HEL': 'orange', 'FED': '#ffd700', 'VSP': '#002f6c'
        };

        function logEvent(description) {
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            eventLog.push({ timestamp, description });
        }

        // Marker Deployment Functionality
        function setMarker(type) { activeType = type; }

        map.on('click', e => { 
            if (activeType) {
                let borderCol = (activeType === 'VSP') ? '#ffd700' : '#fff';
                let m = L.circleMarker(e.latlng, {radius: 9, fillColor: unitColors[activeType], color: borderCol, fillOpacity: 1, weight: 2}).addTo(map);
                
                m.unitType = activeType;
                m.on('click', function(ev) {
                    if (document.getElementById('eraserToggle').checked) {
                        logEvent(`REMOVED: ${this.unitType} Marker at [${this.getLatLng().lat.toFixed(4)}, ${this.getLatLng().lng.toFixed(4)}]`);
                        map.removeLayer(this);
                        mapMarkers = mapMarkers.filter(item => item !== this);
                    }
                });

                mapMarkers.push(m);
                logEvent(`DEPLOYED: ${activeType} Unit placed at [${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}]`);
                activeType = null;
            } 
        });

        // Fixed Freehand Red Pen Logic (No Jitter, Drag-to-Draw)
        let isDrawing = false;
        let currentPolyline = null;

        map.on('mousedown', e => {
            if (document.getElementById('penToggle').checked && !document.getElementById('eraserToggle').checked) {
                isDrawing = true;
                map.dragging.disable(); // Prevent map panning while drawing
                currentPolyline = L.polyline([e.latlng], {color: 'red', weight: 4}).addTo(map);
                penLines.push(currentPolyline);
            }
        });

        map.on('mousemove', e => {
            if (isDrawing && currentPolyline) {
                currentPolyline.addLatLng(e.latlng);
            }
        });

        map.on('mouseup', () => {
            if (isDrawing) {
                isDrawing = false;
                map.dragging.enable();
                logEvent("TACTICAL DRAWING: Red Pen path added to map layers.");
            }
        });

        function toggleEraser(enabled) {
            if (enabled) {
                document.getElementById('penToggle').checked = false;
                map.getContainer().style.cursor = "cell";
            } else {
                map.getContainer().style.cursor = "crosshair";
            }
        }

        // Crossfire Distance Measuring Tool
        let crossfireMode = false;
        let crossfirePoints = [];
        let crossfireLine = null;

        function toggleCrossfire() {
            crossfireMode = !crossfireMode;
            const btn = document.getElementById('crossfireBtn');
            if (crossfireMode) {
                btn.classList.add('btn-active');
                crossfirePoints = [];
                if (crossfireLine) map.removeLayer(crossfireLine);
                alert("CROSSFIRE MODE: Click two deployed units sequentially to calculate distance line.");
            } else {
                btn.classList.remove('btn-active');
                if (crossfireLine) map.removeLayer(crossfireLine);
            }
        }

        map.on('click', e => {
            if (crossfireMode) {
                // Find nearest unit marker within a tight radius
                let clickedMarker = mapMarkers.find(m => map.distance(e.latlng, m.getLatLng()) < 200);
                if (clickedMarker) {
                    crossfirePoints.push(clickedMarker.getLatLng());
                    if (crossfirePoints.length === 2) {
                        let distanceMeters = crossfirePoints[0].distanceTo(crossfirePoints[1]);
                        let distanceFeet = (distanceMeters * 3.28084).toFixed(0);
                        
                        crossfireLine = L.polyline(crossfirePoints, {color: '#00ff41', weight: 3, dashArray: '5, 5'}).addTo(map);
                        crossfireLine.bindPopup(`CROSSFIRE RANGE: ${distanceFeet} FT`, {closeOnClick: false}).openPopup();
                        
                        logEvent(`CROSSFIRE DISTANCE TARGETED: Measured Range is ${distanceFeet} feet.`);
                        crossfireMode = false;
                        document.getElementById('crossfireBtn').classList.remove('btn-active');
                    }
                }
            }
        });

        // Address Search
        function searchAddr() {
            const query = document.getElementById('addrInput').value;
            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query))
                .then(res => res.json())
                .then(data => { 
                    if(data.length > 0) {
                        map.setView([data[0].lat, data[0].lon], 16);
                        logEvent(`MAP NAVIGATION: Command map recentered to address: ${query}`);
                    } 
                });
        }

        // GPS Activation
        function activateGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    let gpsMarker = L.marker([p.coords.latitude, p.coords.longitude]).addTo(map).bindPopup("COMMANDING UNIT LIVE").openPopup();
                    mapMarkers.push(gpsMarker);
                    map.setView([p.coords.latitude, p.coords.longitude], 16);
                    logEvent("GPS TRACKER INITIALIZED: Command Post telemetry locked.");
                }, null, {enableHighAccuracy: true});
            }
        }

        // Terminate Search and Compile Logs
        function terminateSearch() {
            logEvent("COMMAND SIGNAL: EMERGENCY SEARCH SYSTEM TERMINATED.");
            const logBox = document.getElementById('reportLog');
            logBox.innerHTML = "=== TACNET SEARCH INCIDENT COMMAND ARCHIVE ===<br><br>";
            eventLog.forEach(evt => {
                logBox.innerHTML += `[${evt.timestamp}] ${evt.description}<br>`;
            });
            document.getElementById('reportModal').style.display = 'block';
        }

        function replayRecorder() {
            alert("REPLAY RECORDER ACTIVE: Processing sequential event strings.");
        }

        // Reset/Clear Console Button
        function resetConsole() {
            mapMarkers.forEach(m => map.removeLayer(m));
            penLines.forEach(l => map.removeLayer(l));
            if (crossfireLine) map.removeLayer(crossfireLine);
            mapMarkers = [];
            penLines = [];
            eventLog = [];
            document.getElementById('reportModal').style.display = 'none';
        }
    </script>
</body>
</html>
