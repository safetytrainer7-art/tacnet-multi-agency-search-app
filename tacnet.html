<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=1.0" />
    <title>TACNET MULTI-AGENCY RECON MATRIX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; background:#000; color:#00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        .main-ui { display:flex; flex-direction:column; height:100vh; width:100vw; }
        
        /* Tactical Header Styling */
        .top-bar { height: 60px; padding:0 20px; background:#001a00; border-bottom:2px solid #00ff41; display:flex; gap:15px; align-items:center; justify-content: space-between; box-sizing: border-box; }
        .search-container { display:flex; gap:15px; align-items:center; }
        .slider-box { display:flex; align-items:center; gap:8px; font-weight:bold; font-size:12px; }
        .map-toggles { display:flex; gap:8px; }
        
        /* Workspace Framework */
        .middle-section { display:flex; flex:1; width:100%; height:calc(100vh - 135px); }
        #map { flex:1; border-right:2px solid #00ff41; background:#000; cursor: crosshair; }
        
        /* Solid Side Control Console Panel Box */
        .sidebar { width:260px; background:#000; padding:15px; border-left:2px solid #00ff41; display:flex; flex-direction:column; gap:12px; box-sizing: border-box; overflow-y: auto; }
        
        /* Master Scrollable Base Legend Track */
        .legend-bar { height:75px; background:#000; display:flex; align-items:center; overflow-x:auto; white-space:nowrap; gap:25px; padding:0 20px; border-top:2px solid #00ff41; box-sizing: border-box; width: 100%; -webkit-overflow-scrolling: touch; }
        
        /* UI Inputs and Buttons */
        .btn-tac { background:#000; color:#00ff41; border:1px solid #00ff41; padding:10px; cursor:pointer; font-weight:bold; text-transform:uppercase; text-align: center; width: 100%; }
        .btn-map-type { background:#001a00; color:#00ff41; border:1px solid #00ff41; padding:6px 12px; cursor:pointer; font-size:12px; }
        .btn-map-type.active { background:#00ff41; color:#000; font-weight:bold; }
        .btn-danger { color:red; border-color:red; }
        .btn-active { background: #FF8C00 !important; color: #000 !important; border-color: #FF8C00 !important; }
        
        /* Emergency Pulse Assets */
        .btn-sos { background: #ff0000 !important; color: #fff !important; border: 2px solid #fff !important; font-size: 14px; animation: pulseSOS 1s infinite; font-weight: bold; }
        @keyframes pulseSOS { 0% { background: #ff0000; box-shadow: 0 0 10px #ff0000; } 50% { background: #880000; } 100% { background: #ff0000; box-shadow: 0 0 10px #ff0000; } }
        
        .leaflet-sos-pulse { animation: mapPulse 1.2s infinite ease-out; }
        @keyframes mapPulse { 0% { stroke-width: 4; stroke-opacity: 1; fill-opacity: 0.6; } 100% { stroke-width: 25; stroke-opacity: 0; fill-opacity: 0; } }

        input, select, textarea { background:#000; color:#fff; border:1px solid #00ff41; padding:8px; box-sizing: border-box; font-family: monospace; font-size: 14px; }
        .form-block input, .form-block textarea { background: #fff !important; color: #000 !important; border: 1px solid #000 !important; width: 100%; display: block; padding: 6px; box-sizing: border-box; font-size: 13px; }
        
        .large-toggle { width: 22px; height: 22px; cursor: pointer; accent-color: #00ff41; }
        input[type="range"] { -webkit-appearance: none; background: #002b00; border: 1px solid #00ff41; height: 8px; width: 100px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; background: #00ff41; width: 16px; height: 16px; border: 1px solid #000; }

        .toggle-row { display:flex; justify-content:space-between; align-items:center; width:100%; font-size:14px; font-weight:bold; }
        .legend-item { cursor:pointer; font-size:24px; font-weight:bold; display:inline-flex; align-items:center; gap:8px; background: rgba(0,26,0,0.4); padding: 6px 12px; border: 1px solid #333; border-radius: 4px; color: #00ff41; }
        
        .radar-box { border: 1px solid #00ff41; background: #020f02; padding: 10px; font-size: 11px; display: none; flex-direction: column; gap:6px; font-family: monospace; position: relative; overflow: hidden; height: 55px; box-sizing: border-box; width: 100%; }
        .radar-scan-line { position: absolute; top: 0; left: 0; height: 100%; width: 4px; background: #00ff41; opacity: 0.9; box-shadow: 0 0 10px #00ff41; animation: scanAcross 2.5s linear infinite; }
        @keyframes scanAcross { 0% { left: 0%; } 50% { left: 100%; } 100% { left: 0%; } }
        
        .orange-dist-label { background: #000; color: #FF8C00; border: 1px solid #FF8C00; font-weight: bold; font-family: monospace; padding: 4px 8px; font-size: 12px; border-radius: 4px; cursor: pointer; }
        
        /* Form Overlays */
        .modal { display:none; position:fixed; top:2%; left:2%; width:96%; height:96%; background:#111; border:2px solid #00ff41; z-index:9999; padding:20px; box-sizing:border-box; overflow-y:auto; color:#fff; font-family: 'Times New Roman', Times, serif; }
        .report-selector-bar { display: flex; gap: 10px; background: #000; padding: 10px; border: 1px solid #00ff41; margin-bottom: 15px; align-items: center; }
        .report-form-container { background: #fff; color: #000; padding: 20px; box-sizing: border-box; max-width: 800px; margin: 0 auto; display: none; }
        .report-form-container.active { display: block; }
    </style>
</head>
<body>
    <div class="main-ui">
        <div class="top-bar">
            <div class="search-container">
                <button class="btn-tac" style="padding: 6px 12px; font-size: 16px; width: auto;" onclick="window.location.href='signin.html'">⬅</button>
                <input id="addrInput" placeholder="Enter Target Address..." style="width:230px;">
                <button class="btn-tac" style="width: auto;" onclick="searchAddr()">GO</button>
                
                <div class="slider-box">
                    <span>PERIMETER:</span>
                    <input type="range" id="radiusSlider" min="200" max="10560" value="2500" oninput="adjustPerimeter(this.value)">
                    <span id="radiusVal" style="min-width: 60px;">2500 FT</span>
                </div>
            </div>
            
            <div class="map-toggles">
                <button class="btn-map-type active" id="btn-street" onclick="switchBaseLayer('street')">STREETS</button>
                <button class="btn-map-type" id="btn-terrain" onclick="switchBaseLayer('terrain')">TERRAIN</button>
                <button class="btn-map-type" id="btn-sat" onclick="switchBaseLayer('sat')">SATELLITE</button>
            </div>
        </div>

        <div class="middle-section">
            <div id="map"></div>
            
            <div class="sidebar">
                <h3>COMMAND CONSOLE</h3>
                <button class="btn-tac btn-sos" onclick="triggerSOSAlert()">🚨 OFFICER DOWN SOS</button>
                <button class="btn-tac" onclick="setMarker('FND')">🔍 DEPLOY ARTICLE FIND</button>
                <button class="btn-tac" onclick="activateGPS()">ACTIVATE SEARCHERS</button>
                <button class="btn-tac" style="border-color: #ffd700; color: #ffd700;" onclick="triggerTreeTopHeight()">🔎 TREE TOP VIEW</button>
                
                <div class="toggle-row"><span>MAP LOCK</span><input type="checkbox" id="lockToggle" class="large-toggle" onchange="toggleMapLock(this.checked)"></div>
                <div class="toggle-row"><span>RED PEN</span><input type="checkbox" id="penToggle" class="large-toggle" onchange="togglePenMode(this.checked)"></div>
                
                <button class="btn-tac" style="border-color: #ff3333; color: #ff3333;" onclick="eraseLastLine()">❌ ERASE LAST LINE</button>
                <button class="btn-tac" id="crossfireBtn" onclick="toggleCrossfireMode()">CROSSFIRE DIST</button>
                <button class="btn-tac" id="trapTraceBtn" onclick="toggleTrapTrace()">TRAP N TRACE [OFF]</button>
                
                <div class="radar-box" id="radarDisplay">
                    <div class="radar-scan-line"></div>
                    <div style="display:flex; justify-content:space-between; color:#00ff41;"><span>NET: ACTIVE</span><span id="radarPing">14ms</span></div>
                    <div id="radarStatus" style="font-size:9px; color:#aaa;">SWEEPING FREQUENCIES...</div>
                </div>

                <button class="btn-tac" style="border-color: #00ff41; color: #00ff41;" onclick="generateReport()">📄 PREVIEW REPORT</button>
                <button class="btn-tac btn-danger" onclick="resetConsole()">TERMINATE SEARCH</button>
            </div>
        </div>

        <div class="legend-bar" id="tacticalLegend">
            <span class="legend-item" onclick="setMarker('LE')">🔵 LE</span>
            <span class="legend-item" onclick="setMarker('K9')">🔘 K9</span>
            <span class="legend-item" onclick="setMarker('SAR')">🔴 SAR</span>
            <span class="legend-item" onclick="setMarker('CIV')">🟢 CIV</span>
            <span class="legend-item" onclick="setMarker('SUS')">🟣 SUS (LKL)</span>
            <span class="legend-item" onclick="setMarker('DRN')">⚪ DRN</span>
            <span class="legend-item" onclick="setMarker('ART')">🟠 ART</span>
            <span class="legend-item" onclick="setMarker('VIC')">⚪ VIC</span>
            <span class="legend-item" onclick="setMarker('BOAT')">🟡 BOAT</span>
            <span class="legend-item" onclick="setMarker('VEH')">⬛ VEH</span>
            <span class="legend-item" onclick="setMarker('CP')">🟨 CP</span>
            <span class="legend-item" onclick="setMarker('FND')">🔼 FND</span>
            <span class="legend-item" onclick="setMarker('CUS')">🔽 CUS</span>
            <span class="legend-item" onclick="setMarker('HEL')">🟧 HEL</span>
            <span class="legend-item" onclick="setMarker('FED')"><span style="color:#ffd700;">🟡</span> FED</span>
            <span class="legend-item" onclick="setMarker('VSP')"><span style="color:#0000ff; text-shadow: 0 0 3px #ffd700;">🔵</span> VSP</span>
        </div>
    </div>

    <div id="reportModal" class="modal">
        <div class="report-selector-bar">
            <button class="btn-tac" style="width:auto;" onclick="document.getElementById('reportModal').style.display='none'">⬅ MAP</button>
            <button class="btn-tac" id="toggleLEFormBtn" style="border-color:#00ff41; width:auto;" onclick="setActiveForm('LE')">LE REPORT</button>
            <button class="btn-tac" id="toggleFRFormBtn" style="border-color:#aaa; width:auto;" onclick="setActiveForm('FR')">FR REPORT</button>
        </div>
        <div id="formContainerLE" class="report-form-container active">
            <div class="form-header"><h1>TACNET</h1><h2>Law Enforcement Incident Report</h2></div>
            <div class="report-string-box reportLogClass"></div>
        </div>
        <div id="formContainerFR" class="report-form-container">
            <div class="form-header"><h1>TACNET</h1><h2>First Responder Incident Report</h2></div>
            <div class="report-string-box reportLogClass"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            initDuressAccelerometer();
            setTimeout(() => { map.invalidateSize(); }, 300);
        });

        // Map Framework
        const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 });
        const terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 20 });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 });
        const map = L.map('map', { center: [37.4138, -79.1422], zoom: 14, maxZoom: 20, layers: [streetLayer] });

        function switchBaseLayer(type) {
            map.removeLayer(streetLayer); map.removeLayer(terrainLayer); map.removeLayer(satelliteLayer);
            document.getElementById('btn-street').classList.remove('active'); document.getElementById('btn-terrain').classList.remove('active'); document.getElementById('btn-sat').classList.remove('active');
            if (type === 'street') { streetLayer.addTo(map); document.getElementById('btn-street').classList.add('active'); }
            if (type === 'terrain') { terrainLayer.addTo(map); document.getElementById('btn-terrain').classList.add('active'); }
            if (type === 'sat') { satelliteLayer.addTo(map); document.getElementById('btn-sat').classList.add('active'); }
        }

        let eventLog = []; let activeMarkers = []; let drawingLayers = []; let crossfireVectors = [];
        let searchPerimeter = null; let perimeterCenter = null; let activeType = null; let sosVisualRing = null;

        const unitColors = { 'LE': 'blue', 'K9': 'gray', 'SAR': 'red', 'CIV': 'green', 'SUS': 'purple', 'DRN': 'white', 'ART': 'orange', 'VIC': 'white', 'BOAT': 'yellow', 'VEH': 'black', 'CP': 'yellow', 'FND': 'blue', 'CUS': 'blue', 'HEL': 'orange', 'FED': '#ffd700', 'VSP': '#002f6c' };

        function logEvent(desc) {
            const time = new Date().toISOString().replace('T', ' ').substring(0, 19);
            eventLog.push({ time, desc });
        }

        function setMarker(type) { activeType = type; if(document.getElementById('penToggle')) document.getElementById('penToggle').checked = false; crossfireActive = false; }
        function triggerTreeTopHeight() { map.setZoom(20); logEvent("Forced view zoom down to Tree Top Boundaries."); }

        function triggerSOSAlert() {
            logEvent("🚨 CRITICAL: FIELD SOS SIGNAL BROADCASTED.");
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude; const lon = p.coords.longitude;
                if(sosVisualRing) map.removeLayer(sosVisualRing);
                sosVisualRing = L.circle([lat, lon], { radius: 90, color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.5, className: 'leaflet-sos-pulse' }).addTo(map);
                let m = L.marker([lat, lon]).addTo(map).bindPopup(`<b style="color:red;">🚨 OFFICER SOS</b>`).openPopup();
                activeMarkers.push(m); map.setView([lat, lon], 18);
            }, null, {enableHighAccuracy: true});
        }

        function initDuressAccelerometer() {
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', event => {
                    let acceleration = event.accelerationIncludingGravity;
                    let totalForce = Math.sqrt(acceleration.x * acceleration.x + acceleration.y * acceleration.y + acceleration.z * acceleration.z);
                    if (totalForce > 35) { window.removeEventListener('devicemotion', this); executeAutomatedDuressCountdown(); }
                });
            }
        }

        function executeAutomatedDuressCountdown() {
            let countdown = 5;
            let duressTimer = setInterval(() => { countdown--; if (countdown <= 0) { clearInterval(duressTimer); triggerAutomated911Call(); } }, 1000);
            let bypass = confirm(`WARNING: Tactical impact detected. Abort dispatch?`);
            if (bypass) { clearInterval(duressTimer); initDuressAccelerometer(); }
        }

        function triggerAutomated911Call() { window.location.href = "tel:911"; triggerSOSAlert(); }

        map.on('click', e => {
            if (activeType) {
                let borderCol = (activeType === 'VSP') ? '#ffd700' : '#fff';
                let m = L.circleMarker(e.latlng, { radius: 14, fillColor: unitColors[activeType], color: borderCol, fillOpacity: 1, weight: 3, draggable: true }).addTo(map);
                m.unitType = activeType;
                
                if(activeType === 'SUS') m.bindTooltip("SUSPECT LKL", {permanent: true, direction: 'top', className: 'orange-dist-label'}).openTooltip();
                m.on('drag', function() { updateCrossfireDimensionality(); });
                m.on('click', function(ev) { L.DomEvent.stopPropagation(ev); map.removeLayer(this); activeMarkers = activeMarkers.filter(item => item !== this); updateCrossfireDimensionality(); });
                
                m.on('mousedown', function () { if(!document.getElementById('lockToggle').checked) { map.dragging.disable(); map.on('mousemove', onMarkerDrag); } });
                function onMarkerDrag(ev) { m.setLatLng(ev.latlng); updateCrossfireDimensionality(); }
                map.on('mouseup', function () { map.off('mousemove', onMarkerDrag); if(!document.getElementById('lockToggle').checked) map.dragging.enable(); });
                
                activeMarkers.push(m); activeType = null;
            } else if (crossfireActive) {
                handleCrossfireClick(e.latlng);
            }
        });

        function toggleMapLock(locked) { locked ? map.dragging.disable() : map.dragging.enable(); }
        function togglePenMode(checked) { if (checked) { activeType = null; crossfireActive = false; } }
        function eraseLastLine() { if (drawingLayers.length > 0) { map.removeLayer(drawingLayers.pop()); } }

        let isDrawing = false; let activeLine = null;
        map.on('mousedown', e => {
            if (document.getElementById('penToggle').checked) {
                isDrawing = true;
                activeLine = L.polyline([e.latlng], {color: 'red', weight: 4, interactive: false}).addTo(map);
                drawingLayers.push(activeLine);
            }
        });
        map.on('mousemove', e => { if (isDrawing && activeLine) activeLine.addLatLng(e.latlng); });
        map.on('mouseup', () => { if (isDrawing) isDrawing = false; });

        let crossfireActive = false; let firstPoint = null;
        function toggleCrossfireMode() {
            crossfireActive = !crossfireActive; const btn = document.getElementById('crossfireBtn');
            if (crossfireActive) { btn.classList.add('btn-active'); firstPoint = null; activeType = null; } else { btn.classList.remove('btn-active'); }
        }
