<script>
    // Initialize map
    const map = L.map('map').setView([37.4138, -79.1422], 14);
    
    // Use a reliable, fast-loading tile source
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'Map data © OpenStreetMap'
    }).addTo(map);

    // Legend Mapping
    const unitColors = { 'LE': 'blue', 'K9': 'gray', 'SAR': 'red', 'CIV': 'green', 'SUS': 'purple', 'DRN': 'white', 'ART': 'orange', 'VIC': 'white', 'BOAT': 'yellow', 'VEH': 'black', 'CP': 'yellow', 'FND': 'blue', 'CUS': 'blue', 'HEL': 'orange' };
    
    let activeType = null;
    function setMarker(type) { activeType = type; }

    map.on('click', e => { 
        if (activeType) { 
            let m = L.circleMarker(e.latlng, {radius: 8, fillColor: unitColors[activeType], color: '#fff', fillOpacity: 1}).addTo(map);
            m.on('click', function() { map.removeLayer(this); });
            activeType = null;
        } 
    });

    // Address Search
    function searchAddr() {
        const query = document.getElementById('addrInput').value;
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`)
            .then(res => res.json())
            .then(data => {
                if(data.length > 0) map.setView([data[0].lat, data[0].lon], 16);
            });
    }

    // GPS
    function activateGPS() {
        navigator.geolocation.getCurrentPosition(p => {
            L.marker([p.coords.latitude, p.coords.longitude]).addTo(map);
            map.setView([p.coords.latitude, p.coords.longitude], 16);
        }, null, {enableHighAccuracy: true});
    }
</script>
