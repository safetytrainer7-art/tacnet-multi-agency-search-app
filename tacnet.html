<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TACNET</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

header {
    background: #111a2e;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
}

#home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 40vh;
    text-align: center;
}

button {
    padding: 12px 18px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

#startBtn { background: #1e90ff; color: white; }
#sosBtn { background: red; color: white; }

#map {
    height: 60vh;
    width: 100%;
    display: none;
}

#log {
    background: #111a2e;
    padding: 10px;
    height: 120px;
    overflow-y: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<header>TACNET OPERATIONAL</header>

<div id="home">
    <h2>COMMAND HOME</h2>
    <button id="startBtn">START LIVE GPS</button>
    <button id="sosBtn">SOS ALERT</button>
</div>

<div id="map"></div>

<div id="log"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map, marker, watchId;

function log(msg){
    const logBox = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    logBox.innerHTML += `[${time}] ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
}

document.getElementById("startBtn").onclick = function () {

    document.getElementById("home").style.display = "none";
    document.getElementById("map").style.display = "block";

    map = L.map('map').setView([37.5, -79.1], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(
            function(pos){
                let lat = pos.coords.latitude;
                let lng = pos.coords.longitude;

                if (!marker) {
                    marker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 16);
                } else {
                    marker.setLatLng([lat, lng]);
                }

                log("GPS UPDATE: " + lat.toFixed(5) + ", " + lng.toFixed(5));
            },
            function(err){
                log("GPS ERROR: " + err.message);
            },
            { enableHighAccuracy: true }
        );
    } else {
        log("GPS NOT SUPPORTED");
    }

    log("LIVE GPS TRACKING STARTED");
};

document.getElementById("sosBtn").onclick = function () {
    log("!!! SOS ACTIVATED !!!");

    if (navigator.vibrate) {
        navigator.vibrate([300,100,300,100,300]);
    }

    alert("SOS ACTIVATED");
};
</script>

</body>
</html>
