<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin:0; padding:0; height:100%; width:100%; background:#000; color:#00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        .main-ui { display:flex; height:100vh; width:100vw; }
        #map { flex:1; border-right:2px solid #00ff41; }
        .sidebar { width:260px; background:#000; padding:15px; border-left:2px solid #00ff41; display:flex; flex-direction:column; gap:10px; }
        .btn-tac { background:#000; color:#00ff41; border:1px solid #00ff41; padding:10px; cursor:pointer; font-weight:bold; width:100%; text-transform:uppercase; }
        input { background:#000; color:#00ff41; border:1px solid #00ff41; padding:8px; width:100%; box-sizing:border-box; }
    </style>
</head>
<body>
    <div class="main-ui">
        <div id="map"></div>
        <div class="sidebar">
            <input id="addrInput" placeholder="Enter Address...">
            <button class="btn-tac" onclick="searchAddr()">GO</button>
            <hr style="width:100%; border:0; border-top:1px solid #00ff41;">
            <button class="btn-tac" onclick="activateGPS()">ACTIVATE GPS</button>
            <button class="btn-tac" onclick="window.location.href='index.html'" style="color:red; border-color:red;">TERMINATE</button>
        </div>
    </div>
    <script>
        const map = L.map('map').setView([37.4138, -79.1422], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        function searchAddr() { 
            const query = document.getElementById('addrInput').value;
            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query))
                .then(res => res.json())
                .then(data => { if(data.length > 0) map.setView([data[0].lat, data[0].lon], 16); });
        }
        
        function activateGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                L.marker([p.coords.latitude, p.coords.longitude]).addTo(map).bindPopup("FIELD UNIT").openPopup();
                map.setView([p.coords.latitude, p.coords.longitude], 16);
            }, (e) => alert("GPS Error: " + e.message));
        }
    </script>
</body>
</html>
