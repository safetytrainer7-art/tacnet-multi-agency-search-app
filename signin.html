<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TACNET - SECURITY PORTAL</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #00ff41; font-family: -apple-system, BlinkMacSystemFont, monospace; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* FIXED: Centered unified block container stops half-and-half clipping issues */
        .login-card { width: 90%; max-width: 340px; background: #000; border: 2px solid #00ff41; border-radius: 8px; padding: 20px; box-sizing: border-box; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .header { text-align: center; margin-bottom: 20px; width: 100%; }
        .header h1 { margin: 0; font-size: 26px; letter-spacing: 2px; color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        .header p { margin: 5px 0 0 0; font-size: 11px; color: #888; text-transform: uppercase; }
        
        /* Centered choice matrix track buttons */
        .tab-bar { display: flex; border-bottom: 1px solid #00ff41; margin-bottom: 20px; width: 100%; }
        .tab-btn { flex: 1; background: none; border: none; color: #888; padding: 12px 0; font-size: 13px; font-weight: bold; text-transform: uppercase; cursor: pointer; text-align: center; }
        .tab-btn.active { color: #00ff41; border-bottom: 2px solid #00ff41; }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; width: 100%; box-sizing: border-box; }
        .form-group label { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #00ff41; text-align: left; }
        
        input[type="text"], input[type="password"] { background: #001a00; color: #fff; border: 1px solid #00ff41; padding: 12px; font-size: 15px; border-radius: 6px; box-sizing: border-box; width: 100%; display: block; font-family: monospace; }
        input:focus { outline: none; box-shadow: 0 0 8px #00ff41; }
        
        .btn-submit { background: #00ff41; color: #000; border: none; padding: 14px; width: 100%; font-size: 15px; font-weight: bold; text-transform: uppercase; border-radius: 5px; cursor: pointer; margin-top: 5px; letter-spacing: 0.5px; box-sizing: border-box; }
        
        .notice-banner { background: rgba(255, 0, 0, 0.1); border: 1px solid red; color: red; font-size: 10px; padding: 8px; border-radius: 4px; text-align: center; margin-top: 20px; text-transform: uppercase; font-weight: bold; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <h1>TACNET</h1>
            <p>Task Force Authorization Access</p>
        </div>
        
        <div class="tab-bar">
            <div class="tab-btn active" id="tabCmd" onclick="switchLoginMode('commander')">COMMANDER</div>
            <div class="tab-btn" id="tabSrch" onclick="switchLoginMode('searcher')">SEARCH ASSET</div>
        </div>
        
        <div class="form-group">
            <label id="identityLabel">Command Call Sign</label>
            <input type="text" id="userInput" placeholder="Enter Operator ID..." autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>Secure PIN</label>
            <input type="password" id="pinInput" placeholder="••••" inputmode="numeric" pattern="[0-9]*">
        </div>
        
        <button class="btn-submit" onclick="executeAuthentication()">AUTHENTICATE ➔</button>
        
        <div class="notice-banner">
            FOR OFFICIAL USE ONLY // CRIMINAL PENALTIES APPLY
        </div>
    </div>

    <script>
        let selectedRole = 'commander';

        function switchLoginMode(mode) {
            selectedRole = mode;
            document.getElementById('tabCmd').classList.remove('active');
            document.getElementById('tabSrch').classList.remove('active');
            
            const label = document.getElementById('identityLabel');
            const userIn = document.getElementById('userInput');

            if (mode === 'commander') {
                document.getElementById('tabCmd').classList.add('active');
                label.innerText = "Command Call Sign";
                userIn.placeholder = "Enter Operator ID...";
            } else {
                document.getElementById('tabSrch').classList.add('active');
                label.innerText = "Field Asset Badge #";
                userIn.placeholder = "Enter Badge Number...";
            }
        }

        function executeAuthentication() {
            const userValue = document.getElementById('userInput').value.trim();
            const pinValue = document.getElementById('pinInput').value.trim();

            if (!userValue || !pinValue) {
                alert("ACCESS DENIED: Complete credentials prior to vector uplink.");
                return;
            }

            sessionStorage.setItem('tacnet_role', selectedRole);
            sessionStorage.setItem('tacnet_user', userValue);
            window.location.href = 'tacnet.html';
        }
    </script>
</body>
</html>
