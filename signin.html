<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACNET | AUTHENTICATION</title>
    <!-- We are utilizing the Share Tech Mono font for that tactical, operational look -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Share Tech Mono', monospace; background-color: #000; overflow: hidden; }
        
        /* The primary background: Your second image (the tactical backdrop) */
        #signin-portal { 
            height: 100vh; width: 100vw; 
            background: url('second_background_image.jpg') no-repeat center center; 
            background-size: cover; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* Glassmorphism styling: Clear panels, icons, and beautiful blur over the earth backdrop */
        .glass-panel { 
            background: rgba(10, 26, 47, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(135, 206, 250, 0.2); /* Subtle blue glow */
            padding: 40px; border-radius: 12px; width: 320px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .auth-icon { color: #fde08a; font-size: 24px; margin-bottom: 20px; }
        
        input { 
            width: 100%; margin: 10px 0; padding: 12px; border-radius: 4px; border: none; 
            background: rgba(255, 255, 255, 0.1); color: #e9f1ff; 
            font-family: 'Share Tech Mono', monospace;
        }

        button.login-btn { 
            width: 100%; margin-top: 20px; padding: 15px; border-radius: 4px; border: none; 
            background: #1f7a35; color: white; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body>

    <div id="signin-portal">
        <div class="glass-panel">
            <div class="auth-icon">&#128274; SECURE ACCESS REQUIRED</div>
            <p style="color: #e9f1ff; font-size: 14px;">Enter multi-agency search credentials.</p>
            <form id="secure-login">
                <input type="text" placeholder="FULL NAME" required>
                <input type="text" placeholder="AGENCY" required>
                <input type="email" placeholder="OFFICIAL EMAIL" required>
                <input type="password" placeholder="OPERATIONAL PASSWORD" required>
                <button type="submit" class="login-btn">LOGIN TO TACNET</button>
            </form>
        </div>
    </div>

</body>
</html>
