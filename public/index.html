<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACNET LIVE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
#map { height:100vh; }
.top { position:fixed; top:0; left:0; right:0; background:#111; color:#fff; padding:10px; z-index:999; }
button { margin-left:5px; }
</style>
</head>

<body>

<div class="top">
  TACNET LIVE
  <button onclick="emergency()">🚨</button>
  <button onclick="terminate()">STOP</button>
</div>

<div id="map"></div>

<script>

const socket = io();

let user = {
  name: prompt("Name"),
  role: prompt("Role (officer/commander)")
};

socket.emit("join", user);

let map = L.map('map').setView([37.5,-79.2],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = {};

// GPS SEND
navigator.geolocation.watchPosition(pos => {
  socket.emit("gps", {
    name: user.name,
    lat: pos.coords.latitude,
    lng: pos.coords.longitude
  });
});

// RECEIVE USERS
socket.on("users", users => {

  Object.keys(users).forEach(name => {
    let u = users[name];
    if (!u.lat) return;

    if (!markers[name]) {
      markers[name] = L.marker([u.lat,u.lng]).addTo(map);
    } else {
      markers[name].setLatLng([u.lat,u.lng]);
    }
  });

});

// EMERGENCY
socket.on("emergency", d => {
  alert("EMERGENCY: " + d.name);
});

// TERMINATE
socket.on("terminated", data => {
  alert("SEARCH TERMINATED - EVENTS: " + data.length);
});

// BUTTONS
function emergency(){
  socket.emit("emergency", { name:user.name });
}

function terminate(){
  socket.emit("terminate");
}

</script>

</body>
</html>
